<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE CREATOR</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #ff3b30; --bg: #000; --glass: rgba(255, 255, 255, 0.08); --glass-heavy: rgba(0, 0, 0, 0.85); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; height: 100dvh; overflow: hidden; }

        #main-slider { display: flex; width: 200vw; height: 100dvh; transition: transform 0.6s cubic-bezier(0.2, 1, 0.2, 1); }
        .page { width: 100vw; height: 100dvh; position: relative; overflow-y: auto; padding-bottom: 120px; }

        /* --- PROFILO & CREATORE --- */
        #profile-page { background: linear-gradient(135deg, #121212 0%, #000 100%); padding: 40px 25px; }
        .creator-card { background: var(--glass); border-radius: 30px; padding: 25px; border: 1px solid rgba(255,255,255,0.1); margin-top: 30px; }
        .creator-input { width: 100%; background: rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 15px; color: #fff; font-size: 16px; margin: 15px 0; }
        .btn-action { width: 100%; background: #fff; color: #000; border: none; padding: 15px; border-radius: 18px; font-weight: 800; font-size: 15px; transition: 0.2s; }
        .btn-action:active { transform: scale(0.96); }

        /* QR Modal */
        #qr-result { display: none; margin-top: 20px; text-align: center; background: #fff; padding: 20px; border-radius: 25px; color: #000; }
        #qrcode { display: flex; justify-content: center; margin-bottom: 10px; }

        /* --- FEED (Stile TikTok) --- */
        #gallery-feed { height: 100%; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        #gallery-feed::-webkit-scrollbar { display: none; }
        .spot-card { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; }
        .spot-img { width: 100%; height: 100%; object-fit: cover; }
        .vignette { position: absolute; bottom: 0; width: 100%; height: 50%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); pointer-events: none; }
        .details { position: absolute; bottom: 120px; left: 20px; right: 80px; }

        /* --- NAV DOCK --- */
        .nav-dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 280px; height: 70px; background: var(--glass-heavy); backdrop-filter: blur(30px); border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 4000; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .nav-btn { background: none; border: none; font-size: 26px; opacity: 0.4; transition: 0.3s; }
        .nav-btn.active { opacity: 1; transform: scale(1.1); }
        .add-btn { width: 55px; height: 55px; background: var(--accent); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; box-shadow: 0 10px 20px rgba(255,59,48,0.3); }

        /* Camera & Heart (Come prima) */
        #camera-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .heart-pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 100px; color: #ff3b30; opacity: 0; pointer-events: none; z-index: 1000; }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1); } }
    </style>
</head>
<body>

    <div id="main-slider">
        <div class="page" id="profile-page">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:30px;">
                <div id="u-initial" style="width:60px; height:60px; background:var(--accent); border-radius:20px; display:flex; align-items:center; justify-content:center; font-size:24px; font-weight:bold;">?</div>
                <div>
                    <h2 id="u-name" onclick="editName()" style="margin:0;">Anonimo</h2>
                    <span style="font-size:12px; opacity:0.5;">Tocca per cambiare nome</span>
                </div>
            </div>

            <div class="creator-card">
                <h3 style="margin:0; font-size:18px;">✨ Crea un nuovo Varco</h3>
                <p style="font-size:13px; opacity:0.6; margin:8px 0 15px;">Dai un nome al luogo in cui ti trovi per iniziare una nuova bacheca.</p>
                
                <input type="text" id="new-place-name" class="creator-input" placeholder="Es: Piazza-Grande, Skate-Park...">
                <button class="btn-action" onclick="generateNewPlace()">GENERA QR CODE</button>

                <div id="qr-result">
                    <div id="qrcode"></div>
                    <p id="qr-link" style="font-size:11px; margin-bottom:10px; word-break:break-all;"></p>
                    <button onclick="copyLink()" style="background:#f0f0f0; border:none; padding:8px 15px; border-radius:10px; font-size:12px; font-weight:bold;">Copia Link</button>
                    <p style="font-size:10px; color:#888; margin-top:10px;">Fai uno screenshot e condividilo!</p>
                </div>
            </div>
        </div>

        <div class="page">
            <div id="gallery-feed"></div>
        </div>
    </div>

    <div id="camera-modal">
        <video id="video" autoplay playsinline muted></video>
        <div style="position:absolute; bottom:50px; width:100%; display:flex; flex-direction:column; align-items:center; gap:20px; padding:0 30px;">
            <input type="text" id="desc-input" placeholder="Cosa succede?" style="width:100%; background:var(--glass-heavy); border-radius:25px; border:1px solid rgba(255,255,255,0.2); padding:15px; color:#fff;">
            <div style="display:flex; align-items:center; gap:40px;">
                <button onclick="switchCamera()" style="background:none; border:none; font-size:24px; color:#fff;">🔄</button>
                <div onclick="capture()" style="width:80px; height:80px; border-radius:50%; border:4px solid #fff; display:flex; align-items:center; justify-content:center;"><div style="width:65px; height:65px; background:#fff; border-radius:50%;"></div></div>
                <button onclick="closeCam()" style="background:none; border:none; font-size:24px; color:#fff;">✕</button>
            </div>
        </div>
    </div>

    <div class="nav-dock">
        <button class="nav-btn" onclick="goTo(0)" id="n-0">👤</button>
        <button class="add-btn" onclick="openCam()">+</button>
        <button class="nav-btn active" onclick="goTo(1)" id="n-1">🏠</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const SUPABASE_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const idTag = new URLSearchParams(window.location.search).get('id') || 'Varco';
        let profile = JSON.parse(localStorage.getItem('tracce_v4')) || { name: "Esploratore" };
        let currentFacing = 'environment';

        document.getElementById('u-name').innerText = profile.name;
        document.getElementById('u-initial').innerText = profile.name[0].toUpperCase();

        function goTo(p) {
            document.getElementById('main-slider').style.transform = `translateX(-${p * 100}vw)`;
            document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === p));
        }

        function generateNewPlace() {
            const name = document.getElementById('new-place-name').value.trim().replace(/\s+/g, '-');
            if(!name) return alert("Inserisci un nome!");
            
            const url = window.location.origin + window.location.pathname + "?id=" + name;
            document.getElementById('qr-result').style.display = 'block';
            document.getElementById('qrcode').innerHTML = "";
            new QRCode(document.getElementById("qrcode"), { text: url, width: 180, height: 180 });
            document.getElementById('qr-link').innerText = url;
        }

        function copyLink() {
            const link = document.getElementById('qr-link').innerText;
            navigator.clipboard.writeText(link);
            alert("Link copiato! Invialo su WhatsApp.");
        }

        function editName() {
            const n = prompt("Tuo nome:");
            if(n) { profile.name = n; localStorage.setItem('tracce_v4', JSON.stringify(profile)); location.reload(); }
        }

        async function load() {
            const { data } = await supabaseClient.from('spots').select('*').eq('id_tag', idTag).order('created_at', { ascending: false });
            if (data) {
                document.getElementById('gallery-feed').innerHTML = data.map(t => `
                    <div class="spot-card" ondblclick="like('${t.id}')">
                        <img src="${t.foto_url}" class="spot-img">
                        <div class="vignette"></div>
                        <div id="heart-${t.id}" class="heart-pop">❤️</div>
                        <div style="position:absolute; right:15px; bottom:120px; display:flex; flex-direction:column; gap:20px; align-items:center;">
                            <button onclick="like('${t.id}')" style="background:rgba(255,255,255,0.1); backdrop-filter:blur(10px); border:none; width:50px; height:50px; border-radius:50%; color:#fff; font-size:20px;">❤️<br><span style="font-size:10px;" id="l-${t.id}">${t.likes || 0}</span></button>
                        </div>
                        <div class="details">
                            <h3 style="margin:0;">@${t.nome_posto}</h3>
                            <p style="margin:5px 0 0; opacity:0.8;">${t.descrizione || ''}</p>
                            <span style="font-size:10px; opacity:0.4; text-transform:uppercase;">In ${idTag}</span>
                        </div>
                    </div>
                `).join('');
            }
        }

        async function like(id) {
            const h = document.getElementById('heart-'+id);
            h.style.animation = 'pop 0.6s ease-out';
            setTimeout(() => h.style.animation = '', 600);
            const l = document.getElementById('l-'+id);
            l.innerText = parseInt(l.innerText) + 1;
            await supabaseClient.rpc('increment_likes', { row_id: id });
        }

        async function openCam() {
            document.getElementById('camera-modal').style.display = 'block';
            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:currentFacing}});
            document.getElementById('video').srcObject = s;
        }

        function closeCam() {
            document.getElementById('camera-modal').style.display = 'none';
            document.getElementById('video').srcObject.getTracks().forEach(t => t.stop());
        }

        async function capture() {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            if(currentFacing==='user') { ctx.translate(c.width,0); ctx.scale(-1,1); }
            ctx.drawImage(v,0,0);
            const img = c.toDataURL('image/jpeg', 0.6);
            await supabaseClient.from('spots').insert([{ id_tag: idTag, nome_posto: profile.name, descrizione: document.getElementById('desc-input').value, foto_url: img, likes: 0 }]);
            closeCam(); load();
        }

        function switchCamera() { currentFacing = currentFacing==='environment'?'user':'environment'; openCam(); }

        goTo(1); load();
    </script>
</body>
</html>

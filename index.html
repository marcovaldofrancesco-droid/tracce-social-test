<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #ff3b30; --bg: #000; --glass: rgba(255, 255, 255, 0.1); --glass-heavy: rgba(0, 0, 0, 0.9); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; height: 100dvh; overflow: hidden; }

        /* --- HUB GENERALE --- */
        #hub-page { height: 100dvh; width: 100vw; overflow-y: auto; padding: 40px 25px 120px; display: none; }
        .hero h1 { font-size: 42px; letter-spacing: -2px; margin: 0; background: linear-gradient(to right, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .place-card { background: var(--glass); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: #fff; display: block; margin-bottom: 15px; }

        /* --- SLIDER & FEED --- */
        #main-slider { display: flex; width: 200vw; height: 100dvh; transition: transform 0.6s cubic-bezier(0.2, 1, 0.2, 1); }
        .page { width: 100vw; height: 100dvh; position: relative; overflow-y: auto; padding: 40px 25px 120px; }
        #gallery-feed { height: 100%; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; position: absolute; top:0; left:0; }
        #gallery-feed::-webkit-scrollbar { display: none; }
        
        .spot-card { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; }
        .spot-img { width: 100%; height: 100%; object-fit: cover; }
        .vignette { position: absolute; bottom: 0; width: 100%; height: 50%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); pointer-events: none; }
        
        /* Like Heart Pop */
        .heart-pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%) scale(0); font-size: 100px; color: var(--accent); opacity: 0; pointer-events: none; z-index: 1000; }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); } 100% { opacity: 0; transform: translate(-50%, -50%) scale(1); } }

        /* UI Overlay */
        .side-actions { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; }
        .action-btn { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); width: 50px; height: 50px; border-radius: 50%; color: #fff; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 20px; }

        /* --- NAV DOCK --- */
        .nav-dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 280px; height: 70px; background: var(--glass-heavy); backdrop-filter: blur(30px); border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 4000; }
        .nav-btn { background: none; border: none; font-size: 26px; opacity: 0.4; }
        .nav-btn.active { opacity: 1; }
        .add-btn { width: 55px; height: 55px; background: var(--accent); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; }

        #camera-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="hub-page">
        <div class="hero">
            <h1>Tracce</h1>
            <p style="opacity:0.6;">Scopri le storie lasciate nei luoghi fisici intorno a te.</p>
        </div>
        <div style="font-size: 12px; color: var(--accent); letter-spacing: 2px; font-weight: 800; margin-bottom: 15px;">ESPLORA</div>
        <div id="suggested-list">
            <a href="?id=Generale" class="place-card"><b>🌍 Hub Globale</b><span>Vedi tutte le tracce</span></a>
        </div>
        <button class="place-card" style="width:100%; text-align:left; background: var(--accent);" onclick="window.location.href='?id=Nuovo-Posto'">
            <b>✨ Crea un Varco</b>
            <span>Inizia una nuova bacheca qui</span>
        </button>
    </div>

    <div id="main-slider">
        <div class="page" id="profile-page">
            <h1 style="letter-spacing:-1px;">Profilo</h1>
            <div id="u-name" onclick="editName()" style="font-size:24px; font-weight:800; color:var(--accent); margin-bottom:10px;">Anonimo</div>
            <div id="u-stats" style="font-size:12px; opacity:0.5; margin-bottom:30px;">0 TRACCE LASCIATE</div>

            <div style="background:var(--glass); border-radius:25px; padding:20px;">
                <h3>🛠️ Crea QR / NFC</h3>
                <input type="text" id="new-place-name" class="place-card" style="width:100%; background:rgba(0,0,0,0.5); border:1px solid #333;" placeholder="Nome del luogo...">
                <button onclick="generateNewPlace()" style="width:100%; background:#fff; color:#000; border:none; padding:15px; border-radius:15px; font-weight:bold;">GENERA</button>
                <div id="qrcode" style="margin-top:20px; display:flex; justify-content:center; background:#fff; padding:15px; border-radius:15px; display:none;"></div>
            </div>
        </div>

        <div class="page" style="padding:0;">
            <div id="gallery-feed"></div>
        </div>
    </div>

    <div id="camera-modal">
        <video id="video" autoplay playsinline muted></video>
        <div style="position:absolute; bottom:50px; width:100%; display:flex; flex-direction:column; align-items:center; gap:20px; padding:0 30px;">
            <input type="text" id="desc-input" placeholder="Aggiungi una descrizione..." style="width:100%; background:rgba(0,0,0,0.8); border-radius:20px; border:1px solid rgba(255,255,255,0.2); padding:15px; color:#fff;">
            <div style="display:flex; align-items:center; gap:40px;">
                <button onclick="switchCamera()" style="background:none; border:none; font-size:24px; color:#fff;">🔄</button>
                <div onclick="capture()" style="width:80px; height:80px; border-radius:50%; border:4px solid #fff; display:flex; align-items:center; justify-content:center;"><div style="width:65px; height:65px; background:#fff; border-radius:50%;"></div></div>
                <button onclick="closeCam()" style="background:none; border:none; font-size:24px; color:#fff;">✕</button>
            </div>
        </div>
    </div>

    <div class="nav-dock" id="dock">
        <button class="nav-btn" onclick="goTo(0)" id="n-0">👤</button>
        <button class="add-btn" onclick="openCam()">+</button>
        <button class="nav-btn active" onclick="goTo(1)" id="n-1">🏠</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const SUPABASE_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const idTag = new URLSearchParams(window.location.search).get('id');
        let profile = JSON.parse(localStorage.getItem('tracce_v4')) || { name: "Esploratore" };
        let currentFacing = 'environment';

        // Inizializzazione
        if (!idTag) {
            document.getElementById('hub-page').style.display = 'block';
            document.getElementById('dock').style.display = 'none';
        } else {
            document.getElementById('main-slider').style.display = 'flex';
            document.getElementById('u-name').innerText = profile.name;
            loadFeed();
        }

        function goTo(p) {
            document.getElementById('main-slider').style.transform = `translateX(-${p * 100}vw)`;
            document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === p));
        }

        async function loadFeed() {
            const { data } = await supabaseClient.from('spots').select('*').eq('id_tag', idTag).order('created_at', { ascending: false });
            if (data) {
                document.getElementById('gallery-feed').innerHTML = data.map(t => `
                    <div class="spot-card" ondblclick="like('${t.id}')">
                        <img src="${t.foto_url}" class="spot-img">
                        <div class="vignette"></div>
                        <div id="heart-${t.id}" class="heart-pop">❤️</div>
                        <div class="side-actions">
                            <button class="action-btn" onclick="like('${t.id}')">❤️<br><span id="l-${t.id}" style="font-size:10px;">${t.likes || 0}</span></button>
                        </div>
                        <div style="position:absolute; bottom:120px; left:25px; right:80px;">
                            <h3 style="margin:0;">@${t.nome_posto}</h3>
                            <p style="margin:5px 0 0; opacity:0.8; font-size:14px;">${t.descrizione || ''}</p>
                        </div>
                    </div>
                `).join('');
                document.getElementById('u-stats').innerText = data.filter(x => x.nome_posto === profile.name).length + " TRACCE LASCIATE";
            }
        }

        async function like(id) {
            const h = document.getElementById('heart-'+id);
            h.style.animation = 'pop 0.6s ease-out';
            setTimeout(() => h.style.animation = '', 600);
            const el = document.getElementById('l-'+id);
            el.innerText = parseInt(el.innerText) + 1;
            await supabaseClient.rpc('increment_likes', { row_id: id });
        }

        async function openCam() {
            document.getElementById('camera-modal').style.display = 'block';
            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:currentFacing}});
            document.getElementById('video').srcObject = s;
        }

        function closeCam() {
            document.getElementById('camera-modal').style.display = 'none';
            document.getElementById('video').srcObject.getTracks().forEach(t => t.stop());
        }

        async function capture() {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            if(currentFacing==='user') { ctx.translate(c.width,0); ctx.scale(-1,1); }
            ctx.drawImage(v,0,0);
            const img = c.toDataURL('image/jpeg', 0.6);
            
            await supabaseClient.from('spots').insert([{
                id_tag: idTag, nome_posto: profile.name, descrizione: document.getElementById('desc-input').value, foto_url: img, likes: 0
            }]);
            closeCam(); loadFeed();
        }

        function generateNewPlace() {
            const name = document.getElementById('new-place-name').value.trim().replace(/\s+/g, '-');
            if(!name) return;
            const url = window.location.origin + window.location.pathname + "?id=" + name;
            const qrDiv = document.getElementById('qrcode');
            qrDiv.style.display = 'flex';
            qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: url, width: 150, height: 150 });
        }

        function editName() {
            const n = prompt("Tuo nome:");
            if(n) { profile.name = n; localStorage.setItem('tracce_v4', JSON.stringify(profile)); location.reload(); }
        }

        function switchCamera() { currentFacing = currentFacing==='environment'?'user':'environment'; openCam(); }

        goTo(1);
    </script>
</body>
</html>

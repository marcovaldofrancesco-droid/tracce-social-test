<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRACCE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #slider { display: flex; width: 200vw; height: 100vh; transition: 0.4s; }
        .page { width: 100vw; height: 100vh; overflow-y: auto; position: relative; }
        .card { height: 100vh; position: relative; border-bottom: 1px solid #222; }
        .img { width: 100%; height: 100%; object-fit: cover; }
        .info { position: absolute; bottom: 120px; left: 20px; z-index: 5; }
        .btn-play { background: #fff; color: #000; border: none; padding: 12px 20px; border-radius: 20px; font-weight: bold; }
        .nav { position: fixed; bottom: 20px; width: 100%; display: flex; justify-content: center; gap: 40px; z-index: 10; }
        #cam { position: fixed; inset: 0; background: #000; z-index: 20; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .controls { position: absolute; bottom: 40px; width: 100%; display: flex; justify-content: space-around; }
    </style>
</head>
<body>

<div id="slider">
    <div class="page" style="padding: 40px 20px;">
        <h2 id="name-display" onclick="changeName()">Ciao!</h2>
        <input type="text" id="tag-input" placeholder="Nome Posto" style="width:100%; padding:15px; border-radius:10px;">
        <button onclick="makeQR()" style="width:100%; padding:15px; margin-top:10px; background:#fff; font-weight:bold;">GENERA QR</button>
        <div id="qr-out" style="margin-top:20px; display:none; background:#fff; padding:10px;"></div>
    </div>
    <div class="page" id="feed"></div>
</div>

<div class="nav">
    <button onclick="move(0)" style="color:#fff; background:none; border:none; font-size:24px;">👤</button>
    <button onclick="startCam()" style="background:#fff; border:none; width:50px; height:50px; border-radius:50%; font-size:24px;">+</button>
    <button onclick="move(1)" style="color:#fff; background:none; border:none; font-size:24px;">🏠</button>
</div>

<div id="cam">
    <video id="v" autoplay playsinline muted></video>
    <div class="controls">
        <button onclick="stopCam()" style="color:#fff; background:none; border:none;">CHIUDI</button>
        <button onclick="snap()" style="width:70px; height:70px; border-radius:50%; border:4px solid #fff; background:none;"></button>
        <button id="rec" onclick="doRec()" style="background:gray; color:#fff; border:none; padding:10px; border-radius:10px;">🎤 REC</button>
    </div>
</div>

<canvas id="c" style="display:none;"></canvas>

<script>
    const S_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
    const sb = supabase.createClient(S_URL, S_KEY);

    const id = new URLSearchParams(window.location.search).get('id');
    let user = JSON.parse(localStorage.getItem('user_data')) || { n: "User" };
    let rec, chunks = [], aud = null;

    document.getElementById('name-display').innerText = "Ciao, " + user.n;
    if(id) { load(); move(1); }

    async function load() {
        const { data } = await sb.from('spots').select('*').eq('id_tag', id).order('created_at', {ascending: false});
        if(data) document.getElementById('feed').innerHTML = data.map(t => `
            <div class="card">
                <img src="${t.foto_url}" class="img">
                <div class="info">
                    <h3>@${t.nome_posto}</h3>
                    ${t.audio_url ? `<button class="btn-play" onclick="play('${t.audio_url}', this)">ASCOLTA</button>` : ''}
                </div>
            </div>
        `).join('');
    }

    function play(url, b) {
        const a = new Audio(url);
        b.innerText = "ATTENDI...";
        a.play().then(() => b.innerText = "RIPRODUZIONE...").catch(() => b.innerText = "ERRORE (TOCCA)");
        a.onended = () => b.innerText = "ASCOLTA";
    }

    async function doRec() {
        const b = document.getElementById('rec');
        if(!rec || rec.state === 'inactive') {
            const s = await navigator.mediaDevices.getUserMedia({audio: true});
            rec = new MediaRecorder(s);
            chunks = [];
            rec.ondataavailable = e => chunks.push(e.data);
            rec.onstop = () => {
                const blob = new Blob(chunks, {type: 'audio/webm'});
                const r = new FileReader();
                r.readAsDataURL(blob);
                r.onloadend = () => { aud = r.result; b.innerText = "OK ✅"; b.style.background = "green"; };
                s.getTracks().forEach(t => t.stop());
            };
            rec.start();
            b.innerText = "STOP ⏹"; b.style.background = "red";
        } else { rec.stop(); }
    }

    async function snap() {
        const v = document.getElementById('v'), canvas = document.getElementById('c');
        canvas.width = 640; canvas.height = 480;
        canvas.getContext('2d').drawImage(v, 0, 0, 640, 480);
        const f = canvas.toDataURL('image/jpeg', 0.5);
        await sb.from('spots').insert([{ id_tag: id, nome_posto: user.n, foto_url: f, audio_url: aud }]);
        location.reload();
    }

    function startCam() { document.getElementById('cam').style.display = 'block'; navigator.mediaDevices.getUserMedia({video:{facingMode:'environment'}}).then(s=>document.getElementById('v').srcObject=s); }
    function stopCam() { document.getElementById('cam').style.display = 'none'; }
    function move(p) { document.getElementById('slider').style.transform = `translateX(-${p*100}vw)`; }
    function changeName() { const n = prompt("Nome:"); if(n) { user.n = n; localStorage.setItem('user_data', JSON.stringify(user)); location.reload(); }}
    function makeQR() { 
        const v = document.getElementById('tag-input').value; 
        const qr = document.getElementById('qr-out');
        qr.style.display = 'block'; qr.innerHTML = "";
        new QRCode(qr, {text: window.location.origin + window.location.pathname + "?id=" + v, width: 150, height: 150});
    }
</script>
</body>
</html>

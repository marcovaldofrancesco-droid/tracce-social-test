<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #ff3b30; --bg: #000; --glass: rgba(255, 255, 255, 0.12); --glass-heavy: rgba(0, 0, 0, 0.7); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif; height: 100dvh; overflow: hidden; }

        /* Contenitore Slider Orizzontale (Profilo <-> Feed) */
        #main-slider { display: flex; width: 200vw; height: 100dvh; transition: transform 0.5s cubic-bezier(0.19, 1, 0.22, 1); }
        .page { width: 100vw; height: 100dvh; position: relative; overflow: hidden; }

        /* --- PROFILO: LOOK MINIMAL --- */
        #profile-page { background: radial-gradient(circle at top right, #1a1a1a, #000); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .avatar-glow { width: 120px; height: 120px; background: linear-gradient(45deg, #ff3b30, #ff9500); border-radius: 40px; display: flex; align-items: center; justify-content: center; font-size: 45px; font-weight: 800; box-shadow: 0 20px 40px rgba(255, 59, 48, 0.3); margin-bottom: 20px; transform: rotate(-5deg); }
        .user-badge { background: var(--glass); padding: 6px 15px; border-radius: 20px; font-size: 12px; text-transform: uppercase; letter-spacing: 1px; color: #ff3b30; margin-bottom: 10px; border: 1px solid rgba(255, 59, 48, 0.3); }
        
        /* --- FEED: TIKTOK EXPERIENCE --- */
        #gallery-feed { height: 100%; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        #gallery-feed::-webkit-scrollbar { display: none; }

        .spot-card { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #111; }
        .spot-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Gradienti di profondità */
        .vignette-top { position: absolute; top: 0; width: 100%; height: 150px; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); pointer-events: none; }
        .vignette-bottom { position: absolute; bottom: 0; width: 100%; height: 400px; background: linear-gradient(to top, rgba(0,0,0,0.9) 10%, transparent); pointer-events: none; }

        /* Info Overlay */
        .spot-details { position: absolute; bottom: 100px; left: 20px; right: 80px; z-index: 5; }
        .spot-details h3 { margin: 0; font-size: 22px; font-weight: 800; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .spot-details p { margin: 8px 0 0; font-size: 16px; color: rgba(255,255,255,0.8); line-height: 1.4; }

        /* Sidebar Action Menu */
        .actions-sidebar { position: absolute; right: 15px; bottom: 110px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .btn-circle { width: 52px; height: 52px; border-radius: 50%; background: rgba(255,255,255,0.1); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); display: flex; flex-direction: column; align-items: center; justify-content: center; color: #fff; font-size: 22px; transition: 0.2s; }
        .btn-circle:active { transform: scale(0.85); background: rgba(255,255,255,0.2); }
        .btn-circle span { font-size: 11px; font-weight: bold; margin-top: 2px; }

        /* --- FOTOCAMERA FULLSCREEN --- */
        #camera-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .cam-controls { position: absolute; bottom: 50px; width: 100%; display: flex; flex-direction: column; align-items: center; gap: 20px; padding: 0 30px; }
        .shutter-btn { width: 85px; height: 85px; border-radius: 50%; border: 4px solid #fff; background: transparent; display: flex; align-items: center; justify-content: center; }
        .shutter-inner { width: 65px; height: 65px; border-radius: 50%; background: #fff; }

        /* --- NAVIGAZIONE FLOATING --- */
        .nav-dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 280px; height: 68px; background: var(--glass-heavy); backdrop-filter: blur(25px); border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 4000; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .nav-item { background: none; border: none; font-size: 26px; opacity: 0.4; transition: 0.3s; padding: 10px; }
        .nav-item.active { opacity: 1; transform: translateY(-5px); }
        .center-add { width: 54px; height: 54px; background: #ff3b30; border-radius: 20px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; box-shadow: 0 8px 20px rgba(255,59,48,0.4); }

        /* Animazione Like */
        .heart-pop { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 120px; color: #ff3b30; opacity: 0; pointer-events: none; z-index: 1000; }
        @keyframes pop { 0% { transform: translate(-50%, -50%) scale(0); opacity: 0; } 50% { transform: translate(-50%, -50%) scale(1.3); opacity: 1; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 0; } }
    </style>
</head>
<body>

    <div id="main-slider">
        <div class="page" id="profile-page">
            <div class="user-badge" id="u-tag">Esploratore</div>
            <div class="avatar-glow" id="u-initial">?</div>
            <h1 id="u-name" onclick="editName()" style="margin:0; letter-spacing:-1px;">Anonimo</h1>
            <p style="color:#666; font-size:14px; margin-top:5px;">Tocca il nome per modificarlo</p>
            
            <div style="display:flex; gap:15px; margin-top:30px;">
                <div style="text-align:center; background:var(--glass); padding:20px; border-radius:25px; min-width:100px;">
                    <span id="stat-count" style="display:block; font-size:24px; font-weight:800; color:#ff3b30;">0</span>
                    <span style="font-size:11px; text-transform:uppercase; opacity:0.5;">Tracce</span>
                </div>
            </div>
        </div>

        <div class="page">
            <div id="gallery-feed">
                </div>
        </div>
    </div>

    <div id="camera-modal">
        <video id="video" autoplay playsinline muted></video>
        <div class="cam-controls">
            <input type="text" id="desc-input" placeholder="Aggiungi un pensiero..." class="nav-dock" style="position:static; width:100%; background:var(--glass-heavy); transform:none; border:1px solid rgba(255,255,255,0.2); padding:0 20px; font-size:16px; color:#fff;">
            <div style="display:flex; align-items:center; gap:40px;">
                <button onclick="switchCamera()" class="btn-circle">🔄</button>
                <div class="shutter-btn" onclick="capture()"><div class="shutter-inner"></div></div>
                <button onclick="closeCam()" class="btn-circle">✕</button>
            </div>
        </div>
    </div>

    <div class="nav-dock">
        <button class="nav-item" onclick="goTo(0)" id="n-0">👤</button>
        <button class="center-add" onclick="openCam()">+</button>
        <button class="nav-item active" onclick="goTo(1)" id="n-1">🏠</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const SUPABASE_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const idTag = new URLSearchParams(window.location.search).get('id') || 'Varco';
        let profile = JSON.parse(localStorage.getItem('tracce_v3')) || { name: "Esploratore" };
        let currentFacing = 'environment';

        document.getElementById('u-name').innerText = profile.name;
        document.getElementById('u-initial').innerText = profile.name[0].toUpperCase();

        function goTo(p) {
            document.getElementById('main-slider').style.transform = `translateX(-${p * 100}vw)`;
            document.querySelectorAll('.nav-item').forEach((b, i) => b.classList.toggle('active', i === p));
        }

        function editName() {
            const n = prompt("Come vuoi chiamarti?");
            if(n) { profile.name = n; localStorage.setItem('tracce_v3', JSON.stringify(profile)); location.reload(); }
        }

        async function load() {
            const { data } = await supabaseClient.from('spots').select('*').eq('id_tag', idTag).order('created_at', { ascending: false });
            if (data) {
                document.getElementById('gallery-feed').innerHTML = data.map(t => `
                    <div class="spot-card" ondblclick="like('${t.id}')">
                        <img src="${t.foto_url}" class="spot-img">
                        <div class="vignette-top"></div>
                        <div class="vignette-bottom"></div>
                        <div id="heart-${t.id}" class="heart-pop">❤️</div>
                        <div class="actions-sidebar">
                            <button class="btn-circle" onclick="like('${t.id}')">❤️<br><span id="l-${t.id}">${t.likes || 0}</span></button>
                            <button class="btn-circle" onclick="share()">✈️</button>
                        </div>
                        <div class="spot-details">
                            <h3>@${t.nome_posto}</h3>
                            <p>${t.descrizione || ''}</p>
                        </div>
                    </div>
                `).join('');
                document.getElementById('stat-count').innerText = data.filter(x => x.nome_posto === profile.name).length;
            }
        }

        async function like(id) {
            const h = document.getElementById('heart-'+id);
            h.style.animation = 'pop 0.6s ease-out';
            setTimeout(() => h.style.animation = '', 600);
            
            const el = document.getElementById('l-'+id);
            el.innerText = parseInt(el.innerText) + 1;
            await supabaseClient.rpc('increment_likes', { row_id: id });
        }

        async function openCam() {
            document.getElementById('camera-modal').style.display = 'block';
            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:currentFacing, width:1080}});
            document.getElementById('video').srcObject = s;
        }

        function closeCam() {
            document.getElementById('camera-modal').style.display = 'none';
            document.getElementById('video').srcObject.getTracks().forEach(t => t.stop());
        }

        async function capture() {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            if(currentFacing==='user') { ctx.translate(c.width,0); ctx.scale(-1,1); }
            ctx.drawImage(v,0,0);
            const img = c.toDataURL('image/jpeg', 0.6);
            
            await supabaseClient.from('spots').insert([{
                id_tag: idTag, nome_posto: profile.name, descrizione: document.getElementById('desc-input').value, foto_url: img, likes: 0
            }]);
            closeCam(); load();
        }

        function switchCamera() { currentFacing = currentFacing==='environment'?'user':'environment'; openCam(); }
        function share() { window.open(`https://wa.me/?text=${encodeURIComponent('Vedi le tracce qui: '+location.href)}`); }

        goTo(1); load();
    </script>
</body>
</html>

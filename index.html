<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRACCE SOCIAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #ffffff; --bg: #000000; --card: #121212; --text-sec: #888888; }
        
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }

        /* HEADER & CAMERA */
        #header { padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); z-index: 1000; }
        .logo { font-weight: 900; letter-spacing: -1px; font-size: 20px; }
        #sync-status { font-size: 10px; display: flex; align-items: center; gap: 5px; color: var(--text-sec); }
        #sync-status.online::before { content: ""; width: 8px; height: 8px; background: #34c759; border-radius: 50%; box-shadow: 0 0 10px #34c759; }

        #camera-section { position: relative; height: 60vh; width: 100%; overflow: hidden; background: #111; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        /* OVERLAY CONTROLS */
        .camera-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px 20px; box-sizing: border-box; background: linear-gradient(transparent, rgba(0,0,0,0.9)); display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        #input-nome { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 14px; color: #fff; width: 85%; text-align: center; font-size: 16px; backdrop-filter: blur(10px); outline: none; transition: 0.3s; }
        #input-nome:focus { border-color: #fff; background: rgba(255,255,255,0.25); }

        .shutter-container { display: flex; align-items: center; justify-content: center; width: 100%; position: relative; }
        #btn-scatta { width: 75px; height: 75px; border-radius: 50%; border: 4px solid #fff; background: transparent; padding: 5px; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
        #btn-scatta::after { content: ""; display: block; width: 100%; height: 100%; background: #fff; border-radius: 50%; transition: 0.2s; }
        #btn-scatta:active { transform: scale(0.9); }
        #btn-scatta:active::after { background: #ddd; }

        #btn-pos { position: absolute; right: 0; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 10px 15px; border-radius: 12px; font-size: 11px; font-weight: bold; backdrop-filter: blur(10px); }
        #btn-pos.active { background: #34c759; border-color: #34c759; color: #000; }

        /* FEED / GALLERY */
        #gallery-section { padding: 20px; }
        .section-title { font-size: 13px; text-transform: uppercase; letter-spacing: 2px; color: var(--text-sec); margin-bottom: 20px; font-weight: bold; }
        
        .trace-card { background: var(--card); border-radius: 20px; margin-bottom: 25px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .trace-img { width: 100%; display: block; aspect-ratio: 4/5; object-fit: cover; }
        .trace-footer { padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .user-info { display: flex; flex-direction: column; }
        .user-name { font-weight: bold; font-size: 16px; color: #fff; }
        .trace-meta { font-size: 11px; color: var(--text-sec); margin-top: 2px; }
        
        /* Flash animation */
        .flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 2000; }
        @keyframes do-flash { 0% { opacity: 1; } 100% { opacity: 0; } }
    </style>
</head>
<body>

    <div id="flash-effect" class="flash"></div>

    <div id="header">
        <div class="logo">TRACCE</div>
        <div id="sync-status">SISTEMA OFFLINE</div>
    </div>

    <div id="camera-section">
        <video id="video" autoplay playsinline></video>
        <div class="camera-overlay">
            <input type="text" id="input-nome" placeholder="Lascia il tuo nome...">
            <div class="shutter-container">
                <button id="btn-scatta" onclick="capturePhoto()"></button>
                <button id="btn-pos" onclick="getLocation()">GPS</button>
            </div>
        </div>
    </div>

    <div id="gallery-section">
        <div class="section-title">Archivio Tracce</div>
        <div id="gallery-list">Caricamento in corso...</div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const SUPABASE_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const video = document.getElementById('video');
        let userCoords = null;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } })
            .then(s => video.srcObject = s);

        async function loadFeed() {
            const { data, error } = await supabaseClient.from('spots').select('*').eq('id_tag', 'test1').order('created_at', { ascending: false });
            if (!error) {
                document.getElementById('sync-status').innerText = "SISTEMA ONLINE";
                document.getElementById('sync-status').classList.add('online');
                let html = '';
                data.forEach(t => {
                    const d = new Date(t.created_at);
                    const timeStr = d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
                    html += `
                        <div class="trace-card">
                            <img src="${t.foto_url}" class="trace-img">
                            <div class="trace-footer">
                                <div class="user-info">
                                    <span class="user-name">${t.nome_posto}</span>
                                    <span class="trace-meta">${timeStr} • ${t.latitudine.toFixed(3)}, ${t.longitudine.toFixed(3)}</span>
                                </div>
                            </div>
                        </div>`;
                });
                document.getElementById('gallery-list').innerHTML = html || "Nessuna traccia presente.";
            }
        }

        function getLocation() {
            navigator.geolocation.getCurrentPosition(p => {
                userCoords = p.coords;
                const btn = document.getElementById('btn-pos');
                btn.innerText = "GPS ATTIVO";
                btn.classList.add('active');
            }, () => alert("Abilita il GPS!"));
        }

        async function capturePhoto() {
            if (!userCoords) return alert("Sblocca il GPS prima di scattare!");
            const nome = document.getElementById('input-nome').value || "Anonimo";
            
            // Flash effect
            const flash = document.getElementById('flash-effect');
            flash.style.animation = "do-flash 0.4s ease-out";
            setTimeout(() => flash.style.animation = "", 450);

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            const photo = canvas.toDataURL('image/jpeg', 0.5);

            const { error } = await supabaseClient.from('spots').insert([{
                id_tag: 'test1',
                nome_posto: nome,
                foto_url: photo,
                latitudine: userCoords.latitude,
                longitudine: userCoords.longitude
            }]);

            if (!error) {
                document.getElementById('input-nome').value = "";
                loadFeed();
            } else {
                alert("Errore: " + error.message);
            }
        }

        loadFeed();
    </script>
</body>
</html>

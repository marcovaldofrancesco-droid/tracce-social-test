<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRACCE SOCIAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #007AFF; --bg: #050505; --card: #121212; --glass: rgba(255, 255, 255, 0.1); }
        
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; padding-bottom: 80px; }
        
        /* Header elegante */
        #header { padding: 20px; position: sticky; top: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); z-index: 1000; border-bottom: 1px solid #222; display: flex; justify-content: space-between; align-items: center; }
        .logo-box h1 { margin: 0; font-size: 18px; letter-spacing: -0.5px; }
        .logo-box span { font-size: 10px; color: #888; text-transform: uppercase; letter-spacing: 1px; }

        /* Area Camera */
        #camera-container { width: 100%; height: 60vh; position: relative; background: #000; overflow: hidden; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        /* Overlay per Input */
        .camera-ui { position: absolute; bottom: 0; width: 100%; padding: 20px; box-sizing: border-box; background: linear-gradient(transparent, rgba(0,0,0,0.9)); display: flex; flex-direction: column; gap: 10px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; }
        input { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; padding: 12px; color: #fff; font-size: 15px; backdrop-filter: blur(10px); outline: none; }
        input::placeholder { color: #aaa; }

        /* Galleria */
        #gallery-section { padding: 15px; display: flex; flex-direction: column; gap: 20px; }
        .trace-card { background: var(--card); border-radius: 24px; overflow: hidden; border: 1px solid #222; }
        .trace-img { width: 100%; display: block; }
        .trace-content { padding: 15px; }
        .trace-user { font-weight: 700; font-size: 15px; color: var(--accent); }
        .trace-desc { font-size: 14px; margin: 5px 0; color: #eee; line-height: 1.4; }
        .trace-meta { font-size: 10px; color: #555; text-transform: uppercase; margin-top: 8px; }

        /* Barra di Navigazione Inferiore */
        .tab-bar { position: fixed; bottom: 0; width: 100%; height: 70px; background: rgba(15,15,15,0.9); backdrop-filter: blur(20px); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; z-index: 2000; }
        .tab-btn { background: none; border: none; color: #888; display: flex; flex-direction: column; align-items: center; font-size: 10px; gap: 4px; cursor: pointer; }
        .tab-btn.active { color: #fff; }
        .main-btn { width: 55px; height: 55px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; transform: translateY(-15px); border: 5px solid var(--bg); color: #000; font-weight: bold; font-size: 24px; transition: 0.2s; }
        .main-btn:active { transform: translateY(-15px) scale(0.9); }

        .flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 3000; transition: 0.2s; }
    </style>
</head>
<body>

    <div id="flash-effect" class="flash"></div>

    <div id="header">
        <div class="logo-box">
            <span id="label-tag">Tag Position</span>
            <h1 id="nome-luogo-display">...</h1>
        </div>
        <button onclick="shareLink()" style="background:none; border:none; color:var(--accent); font-weight:bold; font-size:14px;">INVITA</button>
    </div>

    <div id="camera-container">
        <video id="video" autoplay playsinline muted></video>
        <div class="camera-ui">
            <div class="input-group">
                <input type="text" id="input-nome" placeholder="Tuo nome...">
                <input type="text" id="input-desc" placeholder="Aggiungi una descrizione...">
            </div>
        </div>
    </div>

    <div id="gallery-section">
        <div id="gallery-list">Caricamento tracce...</div>
    </div>

    <div class="tab-bar">
        <button class="tab-btn active" onclick="window.scrollTo({top:0, behavior:'smooth'})">
            <span>🏠</span> Home
        </button>
        <button class="main-btn" onclick="capturePhoto()">+</button>
        <button class="tab-btn" onclick="shareLink()">
            <span>🔗</span> Invita
        </button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const SUPABASE_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const params = new URLSearchParams(window.location.search);
        const idTag = params.get('id') || 'generale';
        document.getElementById('nome-luogo-display').innerText = idTag.replace(/-/g, ' ').toUpperCase();

        const video = document.getElementById('video');
        let userCoords = null;

        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(s => video.srcObject = s);
        navigator.geolocation.watchPosition(p => userCoords = p.coords, null, { enableHighAccuracy: true });

        async function loadFeed() {
            const { data, error } = await supabaseClient.from('spots').select('*').eq('id_tag', idTag).order('created_at', { ascending: false });
            if (!error) {
                let html = '';
                data.forEach(t => {
                    const d = new Date(t.created_at).toLocaleDateString('it-IT', { day:'numeric', month:'short', hour:'2-digit', minute:'2-digit' });
                    // Usiamo "id_tag" per la descrizione se vuoi o aggiungi una colonna "descrizione" su Supabase.
                    // Per ora usiamo un trucco: salviamo nome e descrizione separati.
                    html += `
                        <div class="trace-card">
                            <img src="${t.foto_url}" class="trace-img">
                            <div class="trace-content">
                                <div class="trace-user">${t.nome_posto}</div>
                                <div class="trace-desc">${t.descrizione || ''}</div>
                                <div class="trace-meta">${d} • ${idTag}</div>
                            </div>
                        </div>`;
                });
                document.getElementById('gallery-list').innerHTML = html || "Ancora nessuna traccia.";
            }
        }

        async function capturePhoto() {
            if (!userCoords) return alert("Attendi il GPS...");
            
            const flash = document.getElementById('flash-effect');
            flash.style.opacity = "1"; setTimeout(() => flash.style.opacity = "0", 200);

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            const photoBase64 = canvas.toDataURL('image/jpeg', 0.5);
            const nome = document.getElementById('input-nome').value || "Anonimo";
            const desc = document.getElementById('input-desc').value || "";

            const { error } = await supabaseClient.from('spots').insert([{
                id_tag: idTag,
                nome_posto: nome,
                descrizione: desc, // Assicurati di aver aggiunto la colonna "descrizione" su Supabase!
                foto_url: photoBase64,
                latitudine: userCoords.latitude,
                longitudine: userCoords.longitude
            }]);

            if (!error) {
                document.getElementById('input-desc').value = "";
                loadFeed();
                window.scrollTo({top: document.body.scrollHeight, behavior: 'smooth'});
            }
        }

        function shareLink() {
            const text = `Vieni a lasciare una traccia al ${idTag.toUpperCase()}! Guarda le mie foto qui: ${window.location.href}`;
            window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, '_blank');
        }

        loadFeed();
    </script>
</body>
</html>

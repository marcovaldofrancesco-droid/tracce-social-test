<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE PREMIUM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --accent: #ff3b30; 
            --bg: #000;
            --card-bg: #1c1c1e;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100dvh; overflow: hidden; -webkit-user-select: none; }

        /* Loader */
        #loader { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; align-items: center; justify-content: center; font-weight: bold; letter-spacing: 1px; }

        /* Slider */
        #main-slider { display: flex; width: 200vw; height: 100dvh; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .page { width: 100vw; height: 100dvh; position: relative; overflow-y: auto; padding-bottom: 140px; }

        /* Feed */
        #gallery-feed { height: 100%; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; }
        .spot-card { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        .spot-img { width: 100%; height: 100%; object-fit: cover; }
        
        .spot-card::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.1) 0%, transparent 50%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
        }

        .info { position: absolute; bottom: 140px; left: 25px; right: 25px; z-index: 10; }
        .info h3 { margin: 0; font-size: 32px; font-weight: 800; letter-spacing: -1px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        .btn-audio { 
            background: rgba(255,255,255,0.2); color: #fff; border: 1px solid rgba(255,255,255,0.3); 
            padding: 14px 26px; border-radius: 40px; font-weight: 700; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            margin-top: 15px; display: flex; align-items: center; gap: 10px; font-size: 13px;
        }

        /* Navigation */
        .nav { 
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 35px; z-index: 1000; 
            background: rgba(30, 30, 30, 0.6); padding: 10px 40px; border-radius: 50px; 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px); border: 1px solid rgba(255,255,255,0.1);
        }
        .nav-btn { background: none; border: none; color: #fff; font-size: 24px; opacity: 0.4; transition: 0.3s; }
        .nav-btn.active { opacity: 1; }
        .add { width: 64px; height: 64px; background: #fff; border-radius: 50%; border: none; font-size: 32px; font-weight: bold; color: #000; }

        /* Camera Modal */
        #cam-modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        
        #rec-btn.recording { background: var(--accent) !important; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="loader">ELABORAZIONE...</div>

<div id="main-slider">
    <div class="page" style="padding: 60px 25px;">
        <h1 id="u-name" onclick="editName()" style="font-size: 38px; font-weight: 900; margin: 0;">Ciao!</h1>
        <p style="opacity: 0.5; margin-bottom: 30px;">Tocca il nome per modificarlo</p>
        
        <div style="background: #1c1c1e; padding: 25px; border-radius: 24px; border: 1px solid rgba(255,255,255,0.05);">
            <input type="text" id="place-name" placeholder="Nome del Tag (es. Milano)" style="width:100%; padding:18px; border-radius:14px; border:none; background:#2c2c2e; color:#fff; font-size:16px; margin-bottom:12px; outline:none;">
            <button onclick="genQR()" style="width:100%; padding:18px; border-radius:14px; border:none; background:#fff; font-weight:800; font-size:16px; color:#000;">GENERA QR CODE</button>
            <div id="qrcode" style="margin-top:20px; display:none; justify-content:center; background:#fff; padding:15px; border-radius:15px;"></div>
        </div>
    </div>

    <div class="page" style="padding:0;"><div id="gallery-feed"></div></div>
</div>

<div class="nav">
    <button class="nav-btn active" id="btn-p" onclick="goTo(0)">👤</button>
    <button class="add" onclick="openCam()">+</button>
    <button class="nav-btn" id="btn-f" onclick="goTo(1)">🏠</button>
</div>

<div id="cam-modal">
    <video id="video" autoplay playsinline muted></video>
    <div style="position:absolute; bottom:50px; width:100%; display:flex; justify-content:space-around; align-items:center;">
        <button onclick="closeCam()" style="color:#fff; background:none; border:none; font-size:32px;">✕</button>
        <button onclick="capture()" style="width:80px; height:80px; border-radius:50%; border:6px solid #fff; background:none;"></button>
        <button id="rec-btn" onclick="toggleRec()" style="width:55px; height:55px; border-radius:50%; border:none; background:rgba(255,255,255,0.2); color:#fff; font-size:22px;">🎤</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const S_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
    const sb = supabase.createClient(S_URL, S_KEY);

    const idTag = new URLSearchParams(window.location.search).get('id');
    let profile = JSON.parse(localStorage.getItem('tracce_v4')) || { name: "Esploratore" };
    let mediaRecorder, chunks = [], audioBase64 = null;
    let audioUnlocked = false;

    // --- SISTEMA DI SBLOCCO AUDIO SILENZIOSO ---
    function silentUnlock() {
        if (audioUnlocked) return;
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const silent = context.createBuffer(1, 1, 22050);
        const source = context.createBufferSource();
        source.buffer = silent;
        source.connect(context.destination);
        source.start(0);
        audioUnlocked = true;
        console.log("Audio Sbloccato");
        window.removeEventListener('click', silentUnlock);
        window.removeEventListener('touchstart', silentUnlock);
    }
    window.addEventListener('click', silentUnlock);
    window.addEventListener('touchstart', silentUnlock);

    document.getElementById('u-name').innerText = "Ciao, " + profile.name;
    if(idTag) { loadFeed(); goTo(1); }

    async function loadFeed() {
        const { data } = await sb.from('spots').select('*').eq('id_tag', idTag).order('created_at', {ascending: false});
        const feed = document.getElementById('gallery-feed');
        if(data && data.length > 0) {
            feed.innerHTML = data.map(t => `
                <div class="spot-card">
                    <img src="${t.foto_url}" class="spot-img">
                    <div class="info">
                        <h3>@${t.nome_posto}</h3>
                        ${t.audio_url ? `<button class="btn-audio" onclick="playAudio('${t.audio_url}', this)">▶ ASCOLTA TRACCIA</button>` : ''}
                    </div>
                </div>
            `).join('');
        } else {
            feed.innerHTML = "<div style='padding:150px 40px; text-align:center; opacity:0.3;'>Nessuna traccia qui.</div>";
        }
    }

    function playAudio(url, btn) {
        const audio = new Audio(url);
        const originalText = btn.innerText;
        btn.innerText = "⌛ CARICAMENTO...";
        
        audio.play()
            .then(() => { btn.innerText = "🎵 IN RIPRODUZIONE"; })
            .catch(() => { btn.innerText = "⚠️ RIPROVA (Tocca schermo)"; });
        
        audio.onended = () => btn.innerText = originalText;
    }

    async function toggleRec() {
        const btn = document.getElementById('rec-btn');
        if(!mediaRecorder || mediaRecorder.state === 'inactive') {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({audio: true});
                mediaRecorder = new MediaRecorder(stream);
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, {type: 'audio/webm'});
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => { audioBase64 = reader.result; btn.innerText = "✅"; btn.classList.remove('recording'); };
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                btn.innerText = "⏹"; btn.classList.add('recording');
            } catch(e) { alert("Attiva il microfono nelle impostazioni!"); }
        } else { mediaRecorder.stop(); }
    }

    async function capture() {
        document.getElementById('loader').style.display = 'flex';
        const v = document.getElementById('video');
        const c = document.getElementById('canvas');
        c.width = 720; c.height = (v.videoHeight / v.videoWidth) * 720;
        c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
        const foto = c.toDataURL('image/jpeg', 0.6);
        await sb.from('spots').insert([{ id_tag: idTag, nome_posto: profile.name, foto_url: foto, audio_url: audioBase64 }]);
        location.reload();
    }

    function openCam() { 
        document.getElementById('cam-modal').style.display = 'block'; 
        navigator.mediaDevices.getUserMedia({video: {facingMode:'environment'}}).then(s => document.getElementById('video').srcObject = s);
    }
    function closeCam() { document.getElementById('cam-modal').style.display = 'none'; }
    function goTo(p) { 
        document.getElementById('main-slider').style.transform = `translateX(-${p * 100}vw)`;
        document.getElementById('btn-p').classList.toggle('active', p===0);
        document.getElementById('btn-f').classList.toggle('active', p===1);
    }
    function editName() { const n = prompt("Nome:"); if(n) { profile.name = n; localStorage.setItem('tracce_v4', JSON.stringify(profile)); location.reload(); }}
    function genQR() { 
        const n = document.getElementById('place-name').value; 
        if(!n) return alert("Inserisci un nome!");
        const url = window.location.origin + window.location.pathname + "?id=" + encodeURIComponent(n);
        const qr = document.getElementById('qrcode');
        qr.style.display = 'flex'; qr.innerHTML = "";
        new QRCode(qr, {text: url, width: 180, height: 180});
    }
</script>
</body>
</html>

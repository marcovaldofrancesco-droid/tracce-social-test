<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE PREMIUM</title>
    
    <link rel="stylesheet" href="style.css">
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div id="loader">ELABORAZIONE...</div>

<div id="main-slider">
    <div class="page" style="padding: 60px 25px;">
        <h1 id="u-name" onclick="editName()" style="font-size: 42px; font-weight: 900; margin: 0; letter-spacing: -1.5px;">Ciao!</h1>
        <p style="opacity: 0.5; margin-top: 5px;">Tocca il nome per cambiarlo</p>
        
        <div class="card" style="background: rgba(255,255,255,0.04); border-radius: 24px; padding: 25px; margin-top: 30px; border: 1px solid rgba(255,255,255,0.05);">
            <input type="text" id="place-name" placeholder="Nome nuovo tag (es: Duomo)" style="width: 100%; background: #1c1c1e; border: 1px solid #3a3a3c; padding: 18px; border-radius: 16px; color: #fff; font-size: 16px; margin-bottom: 12px; outline: none;">
            <button class="btn-main" onclick="genQR()" style="width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 16px; font-weight: 700; font-size: 16px;">Genera QR Code</button>
            <div id="qrcode" style="margin-top:25px; background:#fff; padding:20px; display:none; justify-content:center; border-radius:20px;"></div>
        </div>
    </div>

    <div class="page" style="padding:0;">
        <div id="gallery-feed"></div>
    </div>
</div>

<div class="nav">
    <button class="nav-btn active" id="btn-p" onclick="goTo(0)">👤</button>
    <div style="position: relative;">
        <div class="chrono-ring" id="chrono-ring"></div>
        <button class="add" id="main-action-btn" onclick="openCam()">+</button>
    </div>
    <button class="nav-btn" id="btn-f" onclick="goTo(1)">🏠</button>
</div>

<div id="cam-modal" style="position: fixed; inset: 0; background: #000; z-index: 2000; display: none;">
    <video id="video" autoplay playsinline muted style="width: 100%; height: 100%; object-fit: cover;"></video>
    <div style="position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: space-around; align-items: center; padding: 0 20px;">
        <button onclick="closeCam()" style="color:#fff; background:none; border:none; font-size:30px;">✕</button>
        <button onclick="capture()" style="width:80px; height:80px; border-radius:50%; border:5px solid #fff; background:none;"></button>
        <button id="rec-btn" onclick="toggleRec()" style="color:#fff; background:rgba(255,255,255,0.2); border:none; width:55px; height:55px; border-radius:50%; font-size:22px;">🎤</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    // CONFIGURAZIONE SUPABASE
    const S_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
    const sb = supabase.createClient(S_URL, S_KEY);

    const idTag = new URLSearchParams(window.location.search).get('id');
    let profile = JSON.parse(localStorage.getItem('tracce_v4')) || { name: "Esploratore" };
    let mediaRecorder, chunks = [], audioBase64 = null;

    document.getElementById('u-name').innerText = "Ciao, " + profile.name;

    if(idTag) { loadFeed(); goTo(1); }

    // CARICA FEED DAL DATABASE
    async function loadFeed() {
        const { data } = await sb.from('spots').select('*').eq('id_tag', idTag).order('created_at', {ascending: false});
        const feed = document.getElementById('gallery-feed');
        if(data && data.length > 0) {
            feed.innerHTML = data.map((t, i) => `
                <div class="spot-card">
                    <img src="${t.foto_url}" class="spot-img">
                    <div class="info">
                        <p>${t.nome_posto}</p>
                        <h3>@${idTag}</h3>
                        ${t.audio_url ? `
                            <button class="btn-audio" onclick="playAudio('${t.audio_url}', this)">
                                🔊 ASCOLTA TRACCIA
                            </button>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        }
    }

    // RIPRODUZIONE AUDIO
    function playAudio(base64, btn) {
        const audio = new Audio(base64);
        btn.innerText = "🎵 IN ASCOLTO...";
        audio.play();
        audio.onended = () => btn.innerText = "🔊 ASCOLTA TRACCIA";
    }

    // REGISTRAZIONE AUDIO (CHRONO)
    async function toggleRec() {
        const btn = document.getElementById('rec-btn');
        const ring = document.getElementById('chrono-ring');
        if(!mediaRecorder || mediaRecorder.state === 'inactive') {
            const s = await navigator.mediaDevices.getUserMedia({audio: true});
            mediaRecorder = new MediaRecorder(s);
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, {type: 'audio/webm'});
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => { audioBase64 = reader.result; btn.innerText = "✅"; ring.style.display = 'none'; };
            };
            mediaRecorder.start();
            btn.innerText = "🔴"; ring.style.display = 'block';
        } else { mediaRecorder.stop(); }
    }

    // SCATTA E SALVA
    async function capture() {
        document.getElementById('loader').style.display = 'flex';
        const v = document.getElementById('video');
        const c = document.getElementById('canvas');
        c.width = 640; c.height = (v.videoHeight / v.videoWidth) * 640;
        c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
        const foto = c.toDataURL('image/jpeg', 0.6);

        await sb.from('spots').insert([{ id_tag: idTag, nome_posto: profile.name, foto_url: foto, audio_url: audioBase64 }]);
        location.reload();
    }

    // GESTIONE CAMERA
    function openCam() { 
        document.getElementById('cam-modal').style.display = 'block'; 
        navigator.mediaDevices.getUserMedia({video: {facingMode:'environment'}}).then(s => document.getElementById('video').srcObject = s);
    }
    function closeCam() { 
        document.getElementById('cam-modal').style.display = 'none'; 
        const s = document.getElementById('video').srcObject;
        if(s) s.getTracks().forEach(t => t.stop());
    }

    // NAVIGAZIONE
    function goTo(p) { 
        document.getElementById('main-slider').style.transform = `translateX(-${p * 100}vw)`;
        document.getElementById('btn-p').classList.toggle('active', p===0);
        document.getElementById('btn-f').classList.toggle('active', p===1);
    }

    // NOME E QR
    function editName() { const n = prompt("Nome:"); if(n) { profile.name = n; localStorage.setItem('tracce_v4', JSON.stringify(profile)); location.reload(); }}
    function genQR() { 
        const n = document.getElementById('place-name').value; 
        const url = window.location.origin + window.location.pathname + "?id=" + encodeURIComponent(n);
        const qr = document.getElementById('qrcode');
        qr.style.display = 'flex'; qr.innerHTML = "";
        new QRCode(qr, {text: url, width: 180, height: 180});
    }
</script>
</body>
</html>

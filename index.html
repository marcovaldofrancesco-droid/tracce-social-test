<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRACCE SOCIAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #fff; --bg: #000; --card: #111; --text-sec: #666; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        /* Header con Nome Luogo Dinamico */
        #header { padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid #222; }
        .logo-container { display: flex; flex-direction: column; }
        .logo-main { font-weight: 900; font-size: 14px; letter-spacing: 2px; color: var(--text-sec); text-transform: uppercase; }
        #nome-luogo-display { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
        #sync-status { font-size: 9px; padding: 4px 8px; border-radius: 10px; background: #1a1a1a; color: #4cd964; font-weight: bold; border: 1px solid #222; }

        /* Camera */
        #camera-section { position: relative; height: 50vh; background: #000; overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .camera-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 25px; box-sizing: border-box; background: linear-gradient(transparent, #000); display: flex; flex-direction: column; align-items: center; gap: 15px; }
        
        #input-nome { background: rgba(255,255,255,0.1); border: 1px solid #333; border-radius: 12px; padding: 14px; color: #fff; width: 90%; text-align: center; font-size: 16px; outline: none; transition: 0.3s; }
        #input-nome:focus { border-color: #fff; background: rgba(255,255,255,0.2); }

        #btn-scatta { width: 70px; height: 70px; border-radius: 50%; border: 4px solid #fff; background: transparent; padding: 4px; cursor: pointer; }
        #btn-scatta div { width: 100%; height: 100%; background: #fff; border-radius: 50%; }
        #btn-scatta:active { transform: scale(0.9); }

        /* Galleria */
        #gallery-section { padding: 20px; }
        .trace-card { background: var(--card); border-radius: 20px; margin-bottom: 30px; overflow: hidden; border: 1px solid #222; }
        .trace-img { width: 100%; display: block; object-fit: cover; }
        .trace-info { padding: 15px; }
        .trace-user { font-weight: bold; font-size: 17px; margin-bottom: 4px; display: block; }
        .trace-date { font-size: 11px; color: var(--text-sec); text-transform: uppercase; letter-spacing: 1px; }

        /* Flash animation */
        .flash { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; opacity: 0; pointer-events: none; z-index: 2000; }
    </style>
</head>
<body>

    <div id="flash-effect" class="flash"></div>

    <div id="header">
        <div class="logo-container">
            <span class="logo-main">Traccia in</span>
            <span id="nome-luogo-display">CARICAMENTO...</span>
        </div>
        <div id="sync-status">LIVE</div>
    </div>

    <div id="camera-section">
        <video id="video" autoplay playsinline></video>
        <div class="camera-overlay">
            <input type="text" id="input-nome" placeholder="Il tuo nome o messaggio...">
            <button id="btn-scatta" onclick="capturePhoto()"><div></div></button>
        </div>
    </div>

    <div id="gallery-section">
        <div id="gallery-list">Cercando tracce precedenti...</div>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const SUPABASE_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- GESTIONE LUOGO ---
        const params = new URLSearchParams(window.location.search);
        const idTag = params.get('id') || 'generale';
        document.getElementById('nome-luogo-display').innerText = idTag.replace(/-/g, ' ').toUpperCase();

        const video = document.getElementById('video');
        let userCoords = null;

        // Inizializzazione automatica Camera e GPS
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } }).then(s => video.srcObject = s);
        navigator.geolocation.watchPosition(p => userCoords = p.coords, null, { enableHighAccuracy: true });

        // Caricamento solo delle foto di QUESTO luogo
        async function loadFeed() {
            const { data, error } = await supabaseClient
                .from('spots')
                .select('*')
                .eq('id_tag', idTag) // <--- FILTRO MAGICO: carica solo le foto con questo ID
                .order('created_at', { ascending: false });

            if (!error) {
                let html = '';
                data.forEach(t => {
                    const d = new Date(t.created_at);
                    const dateStr = d.toLocaleDateString('it-IT', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
                    html += `
                        <div class="trace-card">
                            <img src="${t.foto_url}" class="trace-img">
                            <div class="trace-info">
                                <span class="trace-user">${t.nome_posto}</span>
                                <span class="trace-date">${dateStr}</span>
                            </div>
                        </div>`;
                });
                document.getElementById('gallery-list').innerHTML = html || "Questo luogo è ancora vergine. Lascia la prima traccia!";
            }
        }

        async function capturePhoto() {
            if (!userCoords) return alert("Attendi che il GPS si attivi...");
            
            const flash = document.getElementById('flash-effect');
            flash.style.opacity = "1";
            setTimeout(() => flash.style.opacity = "0", 150);

            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth; canvas.height = video.videoHeight;
            ctx.drawImage(video, 0, 0);
            
            const { error } = await supabaseClient.from('spots').insert([{
                id_tag: idTag,
                nome_posto: document.getElementById('input-nome').value || "Anonimo",
                foto_url: canvas.toDataURL('image/jpeg', 0.5),
                latitudine: userCoords.latitude,
                longitudine: userCoords.longitude
            }]);

            if (!error) {
                document.getElementById('input-nome').value = "";
                loadFeed();
            }
        }

        loadFeed();
    </script>
</body>
</html>

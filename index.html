<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRACCE</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --accent: #007AFF; --bg: #000; --card: #151515; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, system-ui, sans-serif; height: 100dvh; overflow: hidden; }

        /* Contenitore Pagine con Swipe */
        #main-slider { display: flex; width: 200vw; height: 100dvh; transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1); }
        .page { width: 100vw; height: 100dvh; position: relative; overflow: hidden; }

        /* --- STILE PROFILO --- */
        #profile-page { background: linear-gradient(180deg, #111 0%, #000 100%); overflow-y: auto; padding-bottom: 100px; }
        .profile-card { padding: 40px 20px; text-align: center; }
        .avatar { width: 90px; height: 90px; background: linear-gradient(45deg, var(--accent), #5856D6); border-radius: 30px; margin: 0 auto 15px; display: flex; align-items: center; justify-content: center; font-size: 32px; box-shadow: 0 10px 20px rgba(0,122,255,0.3); }
        .stats { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .stat-item { background: rgba(255,255,255,0.05); padding: 15px 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        .stat-item b { display: block; font-size: 22px; color: var(--accent); }

        /* --- GALLERIA TIKTOK STYLE --- */
        #gallery-feed { height: 100%; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        #gallery-feed::-webkit-scrollbar { display: none; }

        .spot-card { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; display: flex; align-items: center; justify-content: center; }
        .spot-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Overlay Sfumato */
        .spot-overlay { position: absolute; bottom: 0; left: 0; right: 0; height: 40%; background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%); padding: 30px 20px; display: flex; flex-direction: column; justify-content: flex-end; pointer-events: none; }
        .spot-info h3 { margin: 0; font-size: 20px; font-weight: 700; color: #fff; }
        .spot-info p { margin: 5px 0 0; font-size: 15px; color: rgba(255,255,255,0.7); line-height: 1.4; }

        /* Pulsanti Like */
        .side-actions { position: absolute; right: 15px; bottom: 120px; display: flex; flex-direction: column; gap: 20px; align-items: center; z-index: 10; }
        .action-btn { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border: none; width: 50px; height: 50px; border-radius: 50%; color: #fff; font-size: 22px; display: flex; align-items: center; justify-content: center; }
        .action-btn span { font-size: 12px; margin-top: 4px; font-weight: bold; }

        /* --- CAMERA MODAL --- */
        #camera-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .cam-overlay { position: absolute; bottom: 40px; width: 100%; padding: 0 30px; display: flex; flex-direction: column; gap: 15px; align-items: center; }
        .cam-input { width: 100%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; padding: 15px; color: #fff; backdrop-filter: blur(20px); font-size: 16px; outline: none; }
        .snap-btn { width: 80px; height: 80px; border-radius: 50%; background: #fff; border: 6px solid rgba(255,255,255,0.3); position: relative; }
        .snap-btn:active { transform: scale(0.9); }

        /* --- NAV BAR --- */
        .nav-bar { position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 400px; height: 65px; background: rgba(25,25,25,0.8); backdrop-filter: blur(20px); border-radius: 30px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 4000; }
        .nav-btn { background: none; border: none; font-size: 24px; opacity: 0.4; transition: 0.3s; padding: 10px; }
        .nav-btn.active { opacity: 1; transform: scale(1.1); }
        .add-btn { width: 50px; height: 50px; background: #fff; border-radius: 20px; color: #000; font-size: 28px; display: flex; align-items: center; justify-content: center; font-weight: bold; box-shadow: 0 5px 15px rgba(255,255,255,0.2); }

    </style>
</head>
<body>

    <div id="main-slider">
        <div class="page" id="profile-page">
            <div class="profile-card">
                <div class="avatar" id="u-initial">A</div>
                <h2 id="u-name" onclick="editName()">Esploratore Anonimo</h2>
                <div class="stats">
                    <div class="stat-item"><b id="stat-photos">0</b>Tracce</div>
                    <div class="stat-item"><b id="stat-places">1</b>Luoghi</div>
                </div>
            </div>
        </div>

        <div class="page">
            <div id="gallery-feed">
                </div>
        </div>
    </div>

    <div id="camera-modal">
        <video id="video" autoplay playsinline muted></video>
        <div class="cam-overlay">
            <input type="text" id="desc-input" class="cam-input" placeholder="Cosa succede di bello?">
            <div style="display:flex; align-items:center; gap:40px;">
                <button onclick="switchCamera()" class="action-btn">🔄</button>
                <button onclick="capture()" class="snap-btn"></button>
                <button onclick="closeCam()" class="action-btn">✕</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn" onclick="goTo(0)" id="n-0">👤</button>
        <button class="add-btn" onclick="openCam()">+</button>
        <button class="nav-btn active" onclick="goTo(1)" id="n-1">🏠</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const SUPABASE_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const idTag = new URLSearchParams(window.location.search).get('id') || 'Varco';
        let profile = JSON.parse(localStorage.getItem('tracce_v2')) || { name: "Anonimo" };
        let currentFacing = 'environment';

        // Inizializza Profilo
        document.getElementById('u-name').innerText = profile.name;
        document.getElementById('u-initial').innerText = profile.name[0].toUpperCase();

        function goTo(p) {
            document.getElementById('main-slider').style.transform = `translateX(-${p * 100}vw)`;
            document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === p));
        }

        function editName() {
            const n = prompt("Il tuo nome:");
            if(n) { profile.name = n; localStorage.setItem('tracce_v2', JSON.stringify(profile)); location.reload(); }
        }

        async function load() {
            const { data, error } = await supabaseClient.from('spots').select('*').eq('id_tag', idTag).order('created_at', { ascending: false });
            if (data) {
                document.getElementById('gallery-feed').innerHTML = data.map(t => `
                    <div class="spot-card">
                        <img src="${t.foto_url}" class="spot-img">
                        <div class="side-actions">
                            <button class="action-btn" onclick="like('${t.id}')">❤️<br><span>${t.likes || 0}</span></button>
                            <button class="action-btn" onclick="share()">✈️</button>
                        </div>
                        <div class="spot-overlay">
                            <div class="spot-info">
                                <h3>@${t.nome_posto}</h3>
                                <p>${t.descrizione || ''}</p>
                            </div>
                        </div>
                    </div>
                `).join('');
                document.getElementById('stat-photos').innerText = data.filter(x => x.nome_posto === profile.name).length;
            }
        }

        async function openCam() {
            document.getElementById('camera-modal').style.display = 'block';
            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:currentFacing}});
            document.getElementById('video').srcObject = s;
        }

        function closeCam() {
            document.getElementById('camera-modal').style.display = 'none';
            document.getElementById('video').srcObject.getTracks().forEach(t => t.stop());
        }

        async function capture() {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            if(currentFacing==='user') { ctx.translate(c.width,0); ctx.scale(-1,1); }
            ctx.drawImage(v, 0, 0);
            
            const img = c.toDataURL('image/jpeg', 0.6);
            await supabaseClient.from('spots').insert([{
                id_tag: idTag, nome_posto: profile.name, descrizione: document.getElementById('desc-input').value, foto_url: img
            }]);
            closeCam();
            load();
        }

        function switchCamera() {
            currentFacing = currentFacing === 'environment' ? 'user' : 'environment';
            openCam();
        }

        function share() { window.open(`https://wa.me/?text=${encodeURIComponent('Guarda qui: '+location.href)}`); }

        goTo(1);
        load();
    </script>
</body>
</html>

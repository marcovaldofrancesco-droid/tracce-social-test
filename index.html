<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE UNIVERSAL</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #ff3b30; --bg: #000; --glass: rgba(255, 255, 255, 0.1); --glass-heavy: rgba(0, 0, 0, 0.95); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100dvh; overflow: hidden; }

        /* --- UI ELEMENTS --- */
        #hub-page { height: 100dvh; width: 100vw; padding: 40px 25px; display: none; background: #000; }
        #main-slider { display: flex; width: 200vw; height: 100dvh; transition: transform 0.6s cubic-bezier(0.2, 1, 0.2, 1); }
        .page { width: 100vw; height: 100dvh; position: relative; overflow-y: auto; padding: 40px 25px 120px; }
        
        #gallery-feed { height: 100%; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; position: absolute; top:0; left:0; }
        .spot-card { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #111; }
        .spot-img { width: 100%; height: 100%; object-fit: cover; }
        .vignette { position: absolute; bottom: 0; width: 100%; height: 60%; background: linear-gradient(to top, #000 15%, transparent); pointer-events: none; }
        
        /* BOTTONE AUDIO MIGLIORATO */
        .audio-badge { 
            background: var(--accent); color: #fff; padding: 16px 24px; border-radius: 40px; 
            font-size: 14px; font-weight: 900; display: flex; align-items: center; gap: 10px; 
            margin-top: 15px; cursor: pointer; border: none; outline: none;
            box-shadow: 0 8px 25px rgba(255,59,48,0.4); active { transform: scale(0.95); }
        }

        /* CAMERA & REC */
        #camera-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .cam-ui { position: absolute; bottom: 40px; width: 100%; padding: 0 25px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        #rec-btn { background: rgba(255,255,255,0.2); border: 2px solid #fff; width: 65px; height: 65px; border-radius: 50%; font-size: 26px; color: #fff; display: flex; align-items: center; justify-content: center; }
        #rec-btn.recording { background: var(--accent); border-color: var(--accent); animation: pulse 1s infinite; }
        #rec-btn.ready { border-color: #4cd964; color: #4cd964; box-shadow: 0 0 20px #4cd964; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }

        .nav-dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 280px; height: 70px; background: var(--glass-heavy); backdrop-filter: blur(30px); border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 4000; }
        .add-btn { width: 55px; height: 55px; background: var(--accent); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 32px; color: #fff; }
    </style>
</head>
<body>

    <div id="hub-page">
        <h1>Tracce.</h1>
        <button onclick="window.location.href='?id=Generale'" style="width:100%; background:#fff; padding:20px; border-radius:20px; font-weight:800; border:none;">ENTRA NELL'HUB</button>
    </div>

    <div id="main-slider">
        <div class="page" id="profile-page">
            <h1 id="u-name" onclick="editName()">Esploratore</h1>
            <input type="text" id="new-place-name" style="width:100%; background:#222; border:none; padding:15px; border-radius:15px; color:#fff; margin-top:20px;" placeholder="Nome varco...">
            <button onclick="generateNewPlace()" style="width:100%; background:#fff; padding:15px; border-radius:15px; font-weight:bold; margin-top:10px; border:none;">CREA QR</button>
            <div id="qrcode" style="margin-top:20px; display:none; justify-content:center; background:#fff; padding:15px; border-radius:15px;"></div>
        </div>
        <div class="page" style="padding:0;"><div id="gallery-feed"></div></div>
    </div>

    <div id="camera-modal">
        <video id="video" autoplay playsinline muted></video>
        <div class="cam-ui">
            <input type="text" id="desc-input" placeholder="Cosa senti qui?" style="width:100%; background:rgba(0,0,0,0.8); border:1px solid #444; padding:15px; border-radius:15px; color:#fff;">
            <div style="display:flex; align-items:center; gap:30px;">
                <button onclick="switchCamera()" style="background:none; border:none; font-size:24px;">🔄</button>
                <div onclick="capture()" style="width:75px; height:75px; border-radius:50%; border:4px solid #fff; display:flex; align-items:center; justify-content:center;"><div style="width:60px; height:60px; background:#fff; border-radius:50%;"></div></div>
                <button id="rec-btn" onclick="toggleRecording()">🎤</button>
                <button onclick="closeCam()" style="background:none; border:none; font-size:24px; color:#fff;">✕</button>
            </div>
            <div id="rec-timer" style="font-size:12px; color:var(--accent); font-weight:bold; visibility:hidden;">🔴 REGISTRAZIONE...</div>
        </div>
    </div>

    <div class="nav-dock">
        <button onclick="goTo(0)" style="background:none; border:none; font-size:26px;">👤</button>
        <button class="add-btn" onclick="openCam()">+</button>
        <button onclick="goTo(1)" style="background:none; border:none; font-size:26px;">🏠</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const SUPABASE_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const idTag = new URLSearchParams(window.location.search).get('id');
        let profile = JSON.parse(localStorage.getItem('tracce_v4')) || { name: "Esploratore" };
        let currentFacing = 'environment';
        let mediaRecorder, audioChunks = [], audioBase64 = null;

        if (!idTag) document.getElementById('hub-page').style.display = 'block';
        else { document.getElementById('u-name').innerText = profile.name; load(); }

        async function load() {
            const { data } = await supabaseClient.from('spots').select('*').eq('id_tag', idTag).order('created_at', { ascending: false });
            const feed = document.getElementById('gallery-feed');
            if (data) {
                feed.innerHTML = data.map(t => `
                    <div class="spot-card">
                        <img src="${t.foto_url}" class="spot-img">
                        <div class="vignette"></div>
                        <div style="position:absolute; bottom:120px; left:25px; right:25px;">
                            <h3 style="margin:0;">@${t.nome_posto}</h3>
                            <p style="margin:5px 0 15px; opacity:0.8;">${t.descrizione || ''}</p>
                            ${t.audio_url ? `<button class="audio-badge" onclick="playAudio('${t.audio_url}', this)">🔊 ASCOLTA TRACCIA</button>` : ''}
                        </div>
                    </div>
                `).join('');
            }
        }

        async function toggleRecording() {
            const btn = document.getElementById('rec-btn');
            const timer = document.getElementById('rec-timer');
            
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Polyfill per formati supportati (iOS vs Android)
                const mimeType = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
                mediaRecorder = new MediaRecorder(stream, { mimeType });
                
                audioChunks = [];
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: mimeType });
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = () => { 
                        audioBase64 = reader.result; 
                        btn.classList.add('ready');
                        btn.innerText = "✅";
                    };
                    btn.classList.remove('recording');
                    timer.style.visibility = 'hidden';
                };
                mediaRecorder.start();
                btn.classList.add('recording');
                timer.style.visibility = 'visible';
            } else {
                mediaRecorder.stop();
            }
        }

        function playAudio(base64, btn) {
            if (!base64) return;
            const audio = new Audio(base64);
            const originalText = btn.innerText;
            
            btn.innerText = "⏳ CARICAMENTO...";
            audio.play()
                .then(() => {
                    btn.innerText = "🎵 IN RIPRODUZIONE";
                    audio.onended = () => btn.innerText = originalText;
                })
                .catch(() => {
                    btn.innerText = "❌ TOCCA DI NUOVO";
                    setTimeout(() => btn.innerText = originalText, 2000);
                });
        }

        async function capture() {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            if(currentFacing === 'user') { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(v, 0, 0);
            
            const img = c.toDataURL('image/jpeg', 0.5);
            const { error } = await supabaseClient.from('spots').insert([{ 
                id_tag: idTag, 
                nome_posto: profile.name, 
                descrizione: document.getElementById('desc-input').value, 
                foto_url: img, 
                audio_url: audioBase64,
                likes: 0 
            }]);

            if(!error) {
                audioBase64 = null;
                document.getElementById('rec-btn').classList.remove('ready');
                document.getElementById('rec-btn').innerText = "🎤";
                closeCam(); load();
            } else alert("Errore invio!");
        }

        function openCam() {
            document.getElementById('camera-modal').style.display = 'block';
            navigator.mediaDevices.getUserMedia({video:{facingMode:currentFacing}}).then(s => document.getElementById('video').srcObject = s);
        }

        function closeCam() {
            document.getElementById('camera-modal').style.display = 'none';
            if(document.getElementById('video').srcObject) document.getElementById('video').srcObject.getTracks().forEach(t => t.stop());
        }

        function goTo(p) {
            document.getElementById('main-slider').style.transform = `translateX(-${p * 100}vw)`;
        }

        function editName() {
            const n = prompt("Nome:");
            if(n) { profile.name = n; localStorage.setItem('tracce_v4', JSON.stringify(profile)); location.reload(); }
        }

        function switchCamera() { currentFacing = currentFacing==='environment'?'user':'environment'; openCam(); }

        function generateNewPlace() {
            const name = document.getElementById('new-place-name').value.trim().replace(/\s+/g, '-');
            if(!name) return;
            const url = window.location.origin + window.location.pathname + "?id=" + name;
            const qrDiv = document.getElementById('qrcode');
            qrDiv.style.display = 'flex'; qrDiv.innerHTML = "";
            new QRCode(qrDiv, { text: url, width: 150, height: 150 });
        }
        goTo(1);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRACCE VIDEO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root { --bg: #000; --accent: #ff3b30; --card: #111; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; min-height: 100vh; overflow-x: hidden; }
        
        #header { padding: 20px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(15px); z-index: 1000; border-bottom: 1px solid #222; }
        #nome-luogo-display { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        #sync-status { font-size: 9px; padding: 4px 8px; border-radius: 10px; background: #1a1a1a; color: #4cd964; border: 1px solid #222; }

        #camera-section { position: relative; height: 50vh; background: #000; }
        video#preview { width: 100%; height: 100%; object-fit: cover; }
        
        .camera-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 25px; box-sizing: border-box; background: linear-gradient(transparent, #000); display: flex; flex-direction: column; align-items: center; gap: 15px; }
        #input-nome { background: rgba(255,255,255,0.1); border: 1px solid #333; border-radius: 12px; padding: 12px; color: #fff; width: 90%; text-align: center; outline: none; }

        /* Tasto registrazione stile Instagram */
        #btn-record { width: 80px; height: 80px; border-radius: 50%; border: 5px solid #fff; background: transparent; position: relative; cursor: pointer; transition: 0.3s; }
        #btn-record.recording { border-color: var(--accent); transform: scale(1.2); }
        #btn-record.recording::after { content: ""; position: absolute; top: 15%; left: 15%; width: 70%; height: 70%; background: var(--accent); border-radius: 4px; }
        #progress-bar { position: absolute; top: -10px; left: 0; height: 4px; background: var(--accent); width: 0%; transition: width 0.1s linear; }

        .hint { font-size: 10px; color: #666; margin-top: 5px; }

        /* Galleria */
        #gallery-section { padding: 20px; }
        .trace-card { background: var(--card); border-radius: 20px; margin-bottom: 25px; overflow: hidden; border: 1px solid #222; }
        .media-content { width: 100%; display: block; }
        .trace-info { padding: 15px; }
        .trace-user { font-weight: bold; font-size: 16px; }
    </style>
</head>
<body>

    <div id="header">
        <div id="nome-luogo-display">TRACCE</div>
        <div id="sync-status">LIVE</div>
    </div>

    <div id="camera-section">
        <video id="preview" autoplay playsinline muted></video>
        <div class="camera-overlay">
            <div id="progress-bar"></div>
            <input type="text" id="input-nome" placeholder="Il tuo nome...">
            <button id="btn-record"></button>
            <span class="hint">Premi per foto, tieni premuto per video</span>
        </div>
    </div>

    <div id="gallery-section">
        <div id="gallery-list">Caricamento...</div>
    </div>

    <script>
        const SUPABASE_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const params = new URLSearchParams(window.location.search);
        const idTag = params.get('id') || 'generale';
        document.getElementById('nome-luogo-display').innerText = idTag.toUpperCase();

        const videoElem = document.getElementById('preview');
        const btnRecord = document.getElementById('btn-record');
        const progressBar = document.getElementById('progress-bar');
        
        let mediaRecorder;
        let chunks = [];
        let recordTimeout;
        let isRecording = false;
        let userCoords = null;

        // Init Camera & GPS
        navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: true })
            .then(s => { videoElem.srcObject = s; mediaRecorder = new MediaRecorder(s); 
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = uploadVideo;
            });
        navigator.geolocation.watchPosition(p => userCoords = p.coords);

        // --- GESTIONE INPUT (CLICK vs LONG PRESS) ---
        let pressTimer;
        btnRecord.addEventListener('mousedown', startPress);
        btnRecord.addEventListener('touchstart', startPress);
        btnRecord.addEventListener('mouseup', endPress);
        btnRecord.addEventListener('touchend', endPress);

        function startPress(e) {
            e.preventDefault();
            pressTimer = setTimeout(startRecording, 500); // Se tiene premuto > 0.5s parte video
        }

        function endPress(e) {
            clearTimeout(pressTimer);
            if (isRecording) stopRecording();
            else takePhoto();
        }

        // --- AZIONI ---
        function takePhoto() {
            const canvas = document.createElement('canvas');
            canvas.width = videoElem.videoWidth; canvas.height = videoElem.videoHeight;
            canvas.getContext('2d').drawImage(videoElem, 0, 0);
            saveToDb(canvas.toDataURL('image/jpeg', 0.6), 'image');
        }

        function startRecording() {
            isRecording = true;
            chunks = [];
            mediaRecorder.start();
            btnRecord.classList.add('online', 'recording');
            let start = Date.now();
            recordTimeout = setInterval(() => {
                let elapsed = Date.now() - start;
                progressBar.style.width = (elapsed / 10000 * 100) + "%";
                if (elapsed >= 10000) stopRecording();
            }, 100);
        }

        function stopRecording() {
            isRecording = false;
            clearInterval(recordTimeout);
            mediaRecorder.stop();
            btnRecord.classList.remove('recording');
            progressBar.style.width = "0%";
        }

        async function uploadVideo() {
            const blob = new Blob(chunks, { type: 'video/mp4' });
            const fileName = `${Date.now()}.mp4`;
            
            // 1. Carica su Storage
            const { data, error } = await supabaseClient.storage
                .from('video-tracce')
                .upload(fileName, blob);

            if (!error) {
                const { data: urlData } = supabaseClient.storage.from('video-tracce').getPublicUrl(fileName);
                saveToDb(urlData.publicUrl, 'video');
            }
        }

        async function saveToDb(content, type) {
            if (!userCoords) return alert("GPS non pronto");
            await supabaseClient.from('spots').insert([{
                id_tag: idTag,
                nome_posto: document.getElementById('input-nome').value || "Anonimo",
                foto_url: content, // Usiamo questa colonna per entrambi (URL o Base64)
                latitudine: userCoords.latitude,
                longitudine: userCoords.longitude
            }]);
            loadFeed();
        }

        async function loadFeed() {
            const { data } = await supabaseClient.from('spots').select('*').eq('id_tag', idTag).order('created_at', { ascending: false });
            let html = '';
            data.forEach(t => {
                const isVideo = t.foto_url.includes('.mp4') || t.foto_url.startsWith('http');
                html += `<div class="trace-card">
                    ${isVideo ? `<video src="${t.foto_url}" class="media-content" controls playsinline loop muted autoplay></video>` : `<img src="${t.foto_url}" class="media-content">`}
                    <div class="trace-info"><span class="trace-user">${t.nome_posto}</span></div>
                </div>`;
            });
            document.getElementById('gallery-list').innerHTML = html;
        }

        loadFeed();
    </script>
</body>
</html>

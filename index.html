<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div id="loader" style="display:none;">ELABORAZIONE...</div>

<div id="main-slider">
    <div class="page" style="padding: 60px 30px;">
        <h1 id="u-name" onclick="editName()">Ciao!</h1>
        <div class="card">
            <input type="text" id="place-name" placeholder="Nome nuovo posto...">
            <button class="btn-main" onclick="genQR()">GENERA QR</button>
            <div id="qrcode" style="margin-top:25px; background:#fff; padding:15px; display:none; justify-content:center; border-radius:15px;"></div>
        </div>
    </div>
    <div class="page" style="padding:0;"><div id="gallery-feed"></div></div>
</div>

<div class="nav">
    <button class="nav-btn active" id="btn-p" onclick="goTo(0)">👤</button>
    <div style="position: relative;">
        <div class="chrono-ring" id="chrono-ring"></div>
        <button class="add" onclick="openCam()">+</button>
    </div>
    <button class="nav-btn" id="btn-f" onclick="goTo(1)">🏠</button>
</div>

<div id="cam-modal" style="position:fixed; inset:0; background:#000; z-index:2000; display:none;">
    <video id="video" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
    <div id="rec-status" style="position:absolute; top:40px; width:100%; text-align:center; color:red; font-weight:bold; display:none;">● REGISTRAZIONE...</div>
    <div style="position:absolute; bottom:60px; width:100%; display:flex; justify-content:space-around; align-items:center;">
        <button onclick="closeCam()" style="background:none; border:none; color:#fff; font-size:35px;">✕</button>
        <button id="snap-btn" onclick="capture()" style="width:85px; height:85px; border:6px solid #fff; border-radius:50%; background:none;"></button>
        <button id="rec-btn" onclick="toggleRec()" style="background:rgba(255,255,255,0.2); border:none; width:60px; height:60px; border-radius:50%; color:#fff; font-size:24px;">🎤</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script src="script.js"></script>
</body>
</html>

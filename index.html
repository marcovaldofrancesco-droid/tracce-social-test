<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE PREMIUM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --accent: #ff3b30; 
            --bg: #000;
            --glass-white: rgba(255, 255, 255, 0.12);
            --glass-dark: rgba(20, 20, 20, 0.8);
            --border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif; -webkit-tap-highlight-color: transparent; }
        
        body { margin: 0; background: var(--bg); color: #fff; height: 100dvh; overflow: hidden; }

        /* LOADER CENTRATO */
        #loader { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.9); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center; 
            z-index: 9999; font-weight: 800; font-size: 14px; letter-spacing: 2px;
        }

        #main-slider { display: flex; width: 200vw; height: 100dvh; transition: 0.7s cubic-bezier(0.2, 1, 0.2, 1); }
        .page { width: 100vw; height: 100dvh; position: relative; overflow-y: auto; padding-bottom: 160px; }

        /* FEED IMMERSIVO */
        .spot-card { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        .spot-img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }

        .spot-card::after {
            content: ""; position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.4) 40%, transparent 100%);
            z-index: 2;
        }

        .info { position: absolute; bottom: 160px; left: 30px; right: 30px; z-index: 10; }
        .info p { margin: 0; font-size: 17px; opacity: 0.7; font-weight: 500; }
        .info h3 { margin: 4px 0 18px 0; font-size: 38px; font-weight: 900; letter-spacing: -1.8px; line-height: 1; }

        .btn-audio { 
            background: var(--glass-white); color: #fff; border: 1px solid var(--border); 
            padding: 15px 28px; border-radius: 40px; font-weight: 800; font-size: 12px;
            backdrop-filter: blur(18px); -webkit-backdrop-filter: blur(18px);
            display: inline-flex; align-items: center; gap: 12px;
        }

        /* NAV BAR GLASS */
        .nav { 
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 40px; z-index: 1000; 
            background: var(--glass-dark); padding: 12px 42px; border-radius: 60px; 
            border: 1px solid var(--border); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
        }

        .nav-btn { background: none; border: none; color: #fff; font-size: 26px; opacity: 0.35; }
        .nav-btn.active { opacity: 1; }

        .add { width: 62px; height: 62px; background: #fff; border-radius: 50%; border: none; color: #000; font-size: 32px; font-weight: bold; display: flex; align-items: center; justify-content: center; }

        .chrono-ring { position: absolute; inset: -8px; border-radius: 50%; border: 4px solid var(--accent); display: none; animation: pulse 1.8s infinite ease-out; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.3); opacity: 0; } }

        .card { background: rgba(255,255,255,0.05); border-radius: 28px; padding: 25px; margin-top: 25px; border: 1px solid var(--border); }
        input[type="text"] { width: 100%; background: #111; color: #fff; border: 1px solid #333; padding: 18px; border-radius: 18px; font-size: 16px; margin-bottom: 12px; outline: none; }
        .btn-main { width: 100%; padding: 18px; background: #fff; color: #000; border: none; border-radius: 18px; font-weight: 800; font-size: 16px; }
    </style>
</head>
<body>

<div id="loader">ELABORAZIONE...</div>

<div id="main-slider">
    <div class="page" style="padding: 60px 30px;">
        <h1 id="u-name" onclick="editName()">Ciao!</h1>
        <div class="card">
            <input type="text" id="place-name" placeholder="Nome nuovo posto...">
            <button class="btn-main" onclick="genQR()">GENERA QR</button>
            <div id="qrcode" style="margin-top:25px; background:#fff; padding:15px; display:none; justify-content:center; border-radius:15px;"></div>
        </div>
    </div>

    <div class="page" style="padding:0;"><div id="gallery-feed"></div></div>
</div>

<div class="nav">
    <button class="nav-btn active" id="btn-p" onclick="goTo(0)">👤</button>
    <div style="position: relative;">
        <div class="chrono-ring" id="chrono-ring"></div>
        <button class="add" onclick="openCam()">+</button>
    </div>
    <button class="nav-btn" id="btn-f" onclick="goTo(1)">🏠</button>
</div>

<div id="cam-modal" style="position:fixed; inset:0; background:#000; z-index:2000; display:none;">
    <video id="video" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
    <div style="position:absolute; bottom:60px; width:100%; display:flex; justify-content:space-around; align-items:center;">
        <button onclick="closeCam()" style="background:none; border:none; color:#fff; font-size:35px;">✕</button>
        <button onclick="capture()" style="width:85px; height:85px; border:6px solid #fff; border-radius:50%; background:none;"></button>
        <button id="rec-btn" onclick="toggleRec()" style="background:rgba(255,255,255,0.2); border:none; width:60px; height:60px; border-radius:50%; color:#fff; font-size:24px;">🎤</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const S_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
    const sb = supabase.createClient(S_URL, S_KEY);

    const idTag = new URLSearchParams(window.location.search).get('id');
    let profile = JSON.parse(localStorage.getItem('tracce_v4')) || { name: "Esploratore" };
    let mediaRecorder, chunks = [], audioBase64 = null;

    // Loader logic
    window.onload = () => { document.getElementById('loader').style.display = 'none'; };

    document.getElementById('u-name').innerText = "Ciao, " + profile.name;

    if(idTag) { loadFeed(); goTo(1); }

    async function loadFeed() {
        const { data } = await sb.from('spots').select('*').eq('id_tag', idTag).order('created_at', {ascending: false});
        const feed = document.getElementById('gallery-feed');
        if(data) {
            feed.innerHTML = data.map(t => `
                <div class="spot-card">
                    <img src="${t.foto_url}" class="spot-img">
                    <div class="info">
                        <p>${t.nome_posto}</p>
                        <h3>@${idTag}</h3>
                        ${t.audio_url ? `<button class="btn-audio" onclick="playAudio('${t.audio_url}', this)">🔊 ASCOLTA</button>` : ''}
                    </div>
                </div>
            `).join('');
        }
    }

    function playAudio(base64, btn) {
        const audio = new Audio(base64);
        btn.innerText = "🎵 ASCOLTO...";
        audio.play();
        audio.onended = () => btn.innerText = "🔊 ASCOLTA";
    }

    async function toggleRec() {
        const btn = document.getElementById('rec-btn');
        const ring = document.getElementById('chrono-ring');
        if(!mediaRecorder || mediaRecorder.state === 'inactive') {
            const s = await navigator.mediaDevices.getUserMedia({audio: true});
            mediaRecorder = new MediaRecorder(s);
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, {type: 'audio/webm'});
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => { audioBase64 = reader.result; btn.innerText = "✅"; ring.style.display = 'none'; };
            };
            mediaRecorder.start();
            btn.innerText = "🔴"; ring.style.display = 'block';
        } else { mediaRecorder.stop(); }
    }

    async function capture() {
        document.getElementById('loader').style.display = 'flex';
        const v = document.getElementById('video');
        const c = document.getElementById('canvas');
        c.width = 720; c.height = (v.videoHeight / v.videoWidth) * 720;
        c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
        const foto = c.toDataURL('image/jpeg', 0.7);
        await sb.from('spots').insert([{ id_tag: idTag, nome_posto: profile.name, foto_url: foto, audio_url: audioBase64 }]);
        location.reload();
    }

    function openCam() { 
        document.getElementById('cam-modal').style.display = 'block'; 
        navigator.mediaDevices.getUserMedia({video: {facingMode:'environment'}}).then(s => document.getElementById('video').srcObject = s);
    }
    function closeCam() { document.getElementById('cam-modal').style.display = 'none'; }
    function goTo(p) { 
        document.getElementById('main-slider').style.transform = `translateX(-${p * 100}vw)`;
        document.getElementById('btn-p').classList.toggle('active', p===0);
        document.getElementById('btn-f').classList.toggle('active', p===1);
    }
    function editName() { const n = prompt("Nome:"); if(n) { profile.name = n; localStorage.setItem('tracce_v4', JSON.stringify(profile)); location.reload(); }}
    function genQR() { 
        const n = document.getElementById('place-name').value; 
        const url = window.location.origin + window.location.pathname + "?id=" + encodeURIComponent(n);
        const qr = document.getElementById('qrcode');
        qr.style.display = 'flex'; qr.innerHTML = "";
        new QRCode(qr, {text: url, width: 200, height: 200});
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE HUB</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #ff3b30; --bg: #000; --glass: rgba(255, 255, 255, 0.08); --glass-heavy: rgba(0, 0, 0, 0.95); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: -apple-system, sans-serif; height: 100dvh; overflow: hidden; }

        /* Hub Generale (quando non c'è ID) */
        #hub-page { height: 100dvh; width: 100vw; overflow-y: auto; padding: 40px 25px 120px; display: none; }
        .hero { margin-bottom: 40px; }
        .hero h1 { font-size: 42px; letter-spacing: -2px; margin: 0; background: linear-gradient(to right, #fff, #666); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .section-title { font-size: 14px; text-transform: uppercase; letter-spacing: 2px; color: var(--accent); margin-bottom: 15px; font-weight: 800; }
        .suggested-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px; }
        .place-card { background: var(--glass); border-radius: 20px; padding: 20px; border: 1px solid rgba(255,255,255,0.1); text-decoration: none; color: #fff; }
        .place-card b { display: block; font-size: 18px; margin-bottom: 5px; }
        .place-card span { font-size: 12px; opacity: 0.5; }

        /* Feed & Slider (come prima) */
        #main-slider { display: flex; width: 200vw; height: 100dvh; transition: transform 0.6s cubic-bezier(0.2, 1, 0.2, 1); }
        .page { width: 100vw; height: 100dvh; position: relative; overflow-y: auto; padding: 40px 25px 120px; }
        #gallery-feed { height: 100%; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; position: absolute; top:0; left:0; }
        .spot-card { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; }
        .spot-img { width: 100%; height: 100%; object-fit: cover; }
        .vignette { position: absolute; bottom: 0; width: 100%; height: 50%; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); pointer-events: none; }

        /* UI */
        .nav-dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 280px; height: 70px; background: var(--glass-heavy); backdrop-filter: blur(30px); border-radius: 35px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 4000; }
        .nav-btn { background: none; border: none; font-size: 26px; opacity: 0.4; transition: 0.3s; }
        .nav-btn.active { opacity: 1; transform: scale(1.1); }
        .add-btn { width: 55px; height: 55px; background: var(--accent); border-radius: 22px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; }

        #camera-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

    <div id="hub-page">
        <div class="hero">
            <h1>Esplora le Tracce.</h1>
            <p style="opacity:0.6;">Non sei in nessun Varco fisico. Avvicinati a un Tag NFC o scegli un luogo qui sotto.</p>
        </div>

        <div class="section-title">Varchi Suggeriti</div>
        <div class="suggested-grid">
            <a href="?id=Piazza-Duomo" class="place-card"><b>🇮🇹 Duomo</b><span>12 Tracce</span></a>
            <a href="?id=Skate-Park" class="place-card"><b>🛹 Skate</b><span>8 Tracce</span></a>
            <a href="?id=Stazione" class="place-card"><b>🚉 Centrale</b><span>24 Tracce</span></a>
            <a href="?id=Generale" class="place-card"><b>🌍 Global</b><span>Tutti</span></a>
        </div>

        <div class="section-title">Cosa vuoi fare?</div>
        <button class="place-card" style="width:100%; text-align:left; margin-bottom:15px;" onclick="goToCreator()">
            <b>✨ Crea un nuovo Varco</b>
            <span>Genera un QR o un Tag NFC per un nuovo posto</span>
        </button>
    </div>

    <div id="main-slider" style="display:none;">
        <div class="page" id="profile-page">
            <h1 style="margin:0;">Il Tuo Profilo</h1>
            <div id="u-name" onclick="editName()" style="font-size:20px; color:var(--accent); margin-bottom:30px;">Anonimo</div>
            
            <div style="background:var(--glass); border-radius:25px; padding:20px; border:1px solid rgba(255,255,255,0.1);">
                <h3>🛠️ Strumenti Creatore</h3>
                <input type="text" id="new-place-name" style="width:100%; background:rgba(0,0,0,0.5); border:1px solid #333; padding:15px; border-radius:15px; color:#fff; margin-bottom:10px;" placeholder="Nome luogo...">
                <button onclick="generateNewPlace()" style="width:100%; background:#fff; color:#000; border:none; padding:15px; border-radius:15px; font-weight:bold;">GENERA QR</button>
                <div id="qrcode" style="margin-top:20px; display:flex; justify-content:center;"></div>
            </div>
        </div>

        <div class="page" style="padding:0;">
            <div id="gallery-feed"></div>
        </div>
    </div>

    <div class="nav-dock">
        <button class="nav-btn" onclick="goTo(0)" id="n-0">👤</button>
        <button class="add-btn" onclick="openCam()">+</button>
        <button class="nav-btn active" onclick="goTo(1)" id="n-1">🏠</button>
    </div>

    <script>
        const SUPABASE_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const idTag = urlParams.get('id');

        // LOGICA DI AVVIO
        if (!idTag) {
            document.getElementById('hub-page').style.display = 'block';
            document.querySelector('.nav-dock').style.display = 'none'; // Nascondi nav nell'hub
        } else {
            document.getElementById('main-slider').style.display = 'flex';
            loadFeed();
        }

        function goToCreator() {
            // Se clicca crea nell'hub, lo mandiamo al profilo di un ID generico per ora
            window.location.href = "?id=Generale&setup=true";
        }

        function goTo(p) {
            document.getElementById('main-slider').style.transform = `translateX(-${p * 100}vw)`;
            document.querySelectorAll('.nav-btn').forEach((b, i) => b.classList.toggle('active', i === p));
        }

        async function loadFeed() {
            const { data } = await supabaseClient.from('spots').select('*').eq('id_tag', idTag).order('created_at', { ascending: false });
            if (data && data.length > 0) {
                document.getElementById('gallery-feed').innerHTML = data.map(t => `
                    <div class="spot-card">
                        <img src="${t.foto_url}" class="spot-img">
                        <div class="vignette"></div>
                        <div style="position:absolute; bottom:120px; left:25px;">
                            <h3 style="margin:0; font-size:24px;">@${t.nome_posto}</h3>
                            <p style="margin:5px 0 0; opacity:0.8;">${t.descrizione || ''}</p>
                        </div>
                    </div>
                `).join('');
            } else {
                document.getElementById('gallery-feed').innerHTML = `<div class="spot-card" style="display:flex; align-items:center; justify-content:center; text-align:center; padding:40px;"><div><h2>📍 Benvenuto in ${idTag}</h2><p>Non ci sono ancora tracce qui. Sii il primo a scattare una foto!</p></div></div>`;
            }
        }

        // Funzioni fotocamera, QR e profilo (uguali a prima)
        // ... (capture, openCam, etc)
    </script>
</body>
</html>

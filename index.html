<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE FIX</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #ff3b30; --bg: #000; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100dvh; overflow: hidden; }

        #main-slider { display: flex; width: 200vw; height: 100dvh; transition: transform 0.5s ease; }
        .page { width: 100vw; height: 100dvh; position: relative; overflow-y: auto; padding: 40px 25px 120px; }
        #gallery-feed { height: 100%; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; position: absolute; top:0; left:0; background: #000; }
        
        .spot-card { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; display: flex; align-items: flex-end; }
        .spot-img { position: absolute; top:0; left:0; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .vignette { position: absolute; bottom: 0; width: 100%; height: 70%; background: linear-gradient(to top, #000 10%, transparent); z-index: 2; pointer-events: none; }
        
        .content-overlay { position: relative; z-index: 3; padding: 30px; width: 100%; margin-bottom: 100px; }
        .audio-badge { background: var(--accent); color: #fff; padding: 15px 25px; border-radius: 30px; font-weight: 900; border: none; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        
        .progress-wrapper { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-top: 10px; display: none; }
        .progress-fill { width: 0%; height: 100%; background: #fff; }

        #camera-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .cam-ui { position: absolute; bottom: 40px; width: 100%; padding: 0 25px; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 5001; }
        
        .nav-dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 280px; height: 75px; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 4000; }
        .add-btn { width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; color: #fff; border: none; }
        
        #loading { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:none; align-items:center; justify-content:center; flex-direction:column; }
    </style>
</head>
<body>

    <div id="loading">
        <div style="width:40px; height:40px; border:4px solid #333; border-top-color:var(--accent); border-radius:50%; animation:spin 1s linear infinite;"></div>
        <p>SALVATAGGIO...</p>
    </div>

    <div id="main-slider">
        <div class="page" id="profile-page">
            <h1 id="u-name" onclick="editName()">Esploratore</h1>
            <input type="text" id="new-place-name" placeholder="Nome nuovo varco..." style="width:100%; padding:15px; border-radius:15px; border:none; background:#222; color:#fff; margin-top:20px;">
            <button onclick="generateNewPlace()" style="width:100%; padding:15px; background:#fff; border:none; border-radius:15px; margin-top:10px; font-weight:bold;">CREA QR</button>
            <div id="qrcode" style="margin-top:20px; display:none; background:#fff; padding:15px; border-radius:15px; justify-content:center;"></div>
        </div>
        <div class="page" style="padding:0;"><div id="gallery-feed"></div></div>
    </div>

    <div id="camera-modal">
        <video id="video" autoplay playsinline muted></video>
        <div class="cam-ui">
            <input type="text" id="desc-input" placeholder="Cosa succede qui?" style="width:100%; padding:15px; border-radius:15px; border:none; background:rgba(0,0,0,0.7); color:#fff;">
            <div style="display:flex; align-items:center; gap:30px;">
                <button onclick="switchCamera()" style="background:none; border:none; font-size:25px;">🔄</button>
                <button onclick="capture()" style="width:70px; height:70px; border-radius:50%; border:4px solid #fff; background:none;"></button>
                <button id="rec-btn" onclick="toggleRecording()">🎤</button>
                <button onclick="closeCam()" style="background:none; border:none; font-size:25px; color:#fff;">✕</button>
            </div>
            <div id="rec-status" style="color:var(--accent); font-weight:800; visibility:hidden;">REC: <span id="timer">20</span>s</div>
        </div>
    </div>

    <div class="nav-dock">
        <button onclick="goTo(0)" style="background:none; border:none; font-size:25px;">👤</button>
        <button class="add-btn" onclick="openCam()">+</button>
        <button onclick="goTo(1)" style="background:none; border:none; font-size:25px;">🏠</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const SUPABASE_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const idTag = new URLSearchParams(window.location.search).get('id');
        let profile = JSON.parse(localStorage.getItem('tracce_v4')) || { name: "Esploratore" };
        let mediaRecorder, audioChunks = [], currentFacing = 'environment', capturedAudioBlob = null, recInterval;

        if (idTag) { document.getElementById('u-name').innerText = profile.name; loadFeed(); goTo(1); }

        async function loadFeed() {
            const { data, error } = await supabaseClient.from('spots').select('*').eq('id_tag', idTag).order('created_at', { ascending: false });
            const feed = document.getElementById('gallery-feed');
            if (data && data.length > 0) {
                feed.innerHTML = data.map((t, i) => `
                    <div class="spot-card">
                        <img src="${t.foto_url}" class="spot-img" onerror="this.src='https://via.placeholder.com/1080x1920/000000/FFFFFF?text=Errore+Immagine'">
                        <div class="vignette"></div>
                        <div class="content-overlay">
                            <h2 style="margin:0;">@${t.nome_posto}</h2>
                            <p style="opacity:0.8; margin:10px 0 20px;">${t.descrizione || ''}</p>
                            ${t.audio_url ? `
                                <button class="audio-badge" onclick="playAudio('${t.audio_url}', this, 'bar-${i}')">🔊 ASCOLTA</button>
                                <div class="progress-wrapper" id="wrap-${i}"><div class="progress-fill" id="bar-${i}"></div></div>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
            } else {
                feed.innerHTML = '<div style="padding:100px 40px; text-align:center; opacity:0.5;">Ancora nessuna traccia qui. Sii il primo!</div>';
            }
        }

        async function toggleRecording() {
            const btn = document.getElementById('rec-btn');
            const status = document.getElementById('rec-status');
            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                let t = 20;
                status.style.visibility = 'visible';
                recInterval = setInterval(() => {
                    t--; document.getElementById('timer').innerText = t;
                    if(t <= 0) toggleRecording();
                }, 1000);
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    clearInterval(recInterval);
                    capturedAudioBlob = new Blob(audioChunks, { type: 'audio/mp4' });
                    btn.style.color = "#4cd964"; btn.innerText = "✅";
                    status.style.visibility = 'hidden';
                };
                mediaRecorder.start();
                btn.style.background = "var(--accent)";
            } else {
                mediaRecorder.stop();
                btn.style.background = "rgba(255,255,255,0.2)";
            }
        }

        function playAudio(url, btn, barId) {
            const audio = new Audio(url);
            const bar = document.getElementById(barId);
            const wrap = document.getElementById('wrap-' + barId.split('-')[1]);
            btn.innerText = "⏳...";
            wrap.style.display = 'block';
            audio.ontimeupdate = () => bar.style.width = (audio.currentTime / audio.duration) * 100 + "%";
            audio.play().then(() => {
                btn.innerText = "🎵 IN RIPRODUZIONE";
                audio.onended = () => { btn.innerText = "🔊 ASCOLTA"; wrap.style.display = 'none'; };
            }).catch(() => alert("Impossibile riprodurre l'audio."));
        }

        async function capture() {
            document.getElementById('loading').style.display = 'flex';
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            if(currentFacing === 'user') { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(v, 0, 0);
            const fotoBlob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.8));
            const name = "T_" + Date.now();

            try {
                // UPLOAD
                const fPath = 'foto/' + name + '.jpg';
                await supabaseClient.storage.from('spots').upload(fPath, fotoBlob);
                const { data: fLink } = supabaseClient.storage.from('spots').getPublicUrl(fPath);

                let aLink = null;
                if(capturedAudioBlob) {
                    const aPath = 'audio/' + name + '.mp4';
                    await supabaseClient.storage.from('spots').upload(aPath, capturedAudioBlob);
                    const { data: res } = supabaseClient.storage.from('spots').getPublicUrl(aPath);
                    aLink = res.publicUrl;
                }

                await supabaseClient.from('spots').insert([{ 
                    id_tag: idTag, nome_posto: profile.name, 
                    descrizione: document.getElementById('desc-input').value, 
                    foto_url: fLink.publicUrl, audio_url: aLink 
                }]);

                location.reload();
            } catch (e) { 
                alert("Errore caricamento. Verifica il bucket 'spots' su Supabase."); 
                document.getElementById('loading').style.display = 'none';
            }
        }

        function openCam() { 
            document.getElementById('camera-modal').style.display = 'block'; 
            navigator.mediaDevices.getUserMedia({video:{facingMode:currentFacing, width:1280}}).then(s => document.getElementById('video').srcObject = s);
            // Sblocco audio per iOS
            new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=").play();
        }
        function closeCam() { document.getElementById('camera-modal').style.display = 'none'; if(document.getElementById('video').srcObject) document.getElementById('video').srcObject.getTracks().forEach(t => t.stop()); }
        function goTo(p) { document.getElementById('main-slider').style.transform = `translateX(-${p * 100}vw)`; }
        function editName() { const n = prompt("Nome:"); if(n) { profile.name = n; localStorage.setItem('tracce_v4', JSON.stringify(profile)); location.reload(); }}
        function switchCamera() { currentFacing = currentFacing==='environment'?'user':'environment'; openCam(); }
        function generateNewPlace() { const n = document.getElementById('new-place-name').value.trim().replace(/\s+/g, '-'); if(!n) return; const url = window.location.origin + window.location.pathname + "?id=" + n; const qr = document.getElementById('qrcode'); qr.style.display = 'flex'; qr.innerHTML = ""; new QRCode(qr, { text: url, width: 150, height: 150 }); }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </script>
</body>
</html>

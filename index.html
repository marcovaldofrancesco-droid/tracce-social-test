<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #ff3b30; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; height: 100dvh; overflow: hidden; }
        
        #slider { display: flex; width: 200vw; height: 100dvh; transition: 0.5s cubic-bezier(0.2, 1, 0.2, 1); }
        .page { width: 100vw; height: 100dvh; position: relative; overflow-y: auto; padding-bottom: 120px; }

        /* FIX POSIZIONAMENTO PROFILO */
        #profile-page { padding: 100px 25px 40px 25px; }

        /* Estetica Immagine 1 - Foto NON stretchata e NON a tutto schermo */
        .spot-card { 
            height: 100dvh; scroll-snap-align: start; position: relative; background: #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 20px 0 140px 0;
        }
        .spot-img-container {
            width: 90%; height: 60%; /* Proporzioni simili al concept */
            position: relative; overflow: hidden; border-radius: 20px; 
            background: #111; /* Sfondo neutro mentre carica */
        }
        
        /* IL FIX PER LO STRETCH: object-fit cover */
        .spot-img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; /* Taglia i bordi ma NON deforma */
            display: block;
        }
        
        .overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 60%, rgba(0,0,0,0.4)); pointer-events: none; }
        
        .play-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85px; height: 85px; background: rgba(255,255,255,0.15); 
            backdrop-filter: blur(12px); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.2); z-index: 5;
        }
        .play-icon { width: 0; height: 0; border-top: 15px solid transparent; border-bottom: 15px solid transparent; border-left: 25px solid white; margin-left: 5px; }

        /* Info nello spazio nero sotto la foto */
        .info { width: 90%; margin-top: 25px; text-align: left; }
        .date { font-size: 11px; color: rgba(255,255,255,0.5); font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; }
        .place-title { margin: 5px 0; font-size: 30px; font-weight: 900; letter-spacing: -1px; }
        
        .p-cont { width: 100%; height: 3px; background: rgba(255,255,255,0.1); border-radius: 2px; margin-top: 12px; overflow: hidden; }
        .p-bar { height: 100%; background: #fff; width: 0%; }

        /* Navigazione */
        .nav { position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); display: flex; gap: 40px; z-index: 1000; background: rgba(25,25,25,0.85); padding: 12px 35px; border-radius: 50px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.08); align-items: center; }
        .nav-btn { background: none; border: none; color: #fff; opacity: 0.5; display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; }
        .nav-btn.active { opacity: 1; }
        .add { width: 60px; height: 60px; background: var(--accent); border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(255,59,48,0.3); }
        .svg-icon { width: 24px; height: 24px; fill: currentColor; }

        /* Camera & Mic Animazione */
        #cam-modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #mic-wave { position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%); width: 70px; height: 70px; border-radius: 50%; background: rgba(255,59,48,0.3); display: none; align-items: center; justify-content: center; z-index: 2001; }
        .wave-anim { position: absolute; inset: 0; border-radius: 50%; border: 2px solid var(--accent); animation: ripple 1.5s infinite; }
        @keyframes ripple { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.2); opacity: 0; } }
    </style>
</head>
<body>

<div id="slider">
    <div class="page" id="profile-page">
        <h1 id="u-name" onclick="editName()" style="font-size: 42px; font-weight: 900; margin:0; letter-spacing: -1.5px;">Ciao!</h1>
        <p style="color: rgba(255,255,255,0.4); margin-top: 5px;">Tocca il nome per cambiarlo</p>
        <div style="background: #111; padding: 25px; border-radius: 30px; margin-top: 40px; border: 1px solid #222;">
            <input type="text" id="place-name" placeholder="Nome di questo posto..." style="width:100%; padding:18px; border-radius:15px; border:none; background:#1c1c1e; color:#fff; font-size:16px; margin-bottom:12px;">
            <button onclick="genQR()" style="width:100%; padding:18px; border-radius:15px; background:#fff; font-weight:900; color:#000; border:none;">GENERA QR</button>
            <div id="qrcode" style="margin-top:20px; display:none; justify-content:center; background:#fff; padding:15px; border-radius:15px;"></div>
        </div>
    </div>
    <div class="page" id="gallery-feed" style="scroll-snap-type: y mandatory;"></div>
</div>

<div class="nav">
    <button onclick="goTo(0)" class="nav-btn" id="btn-prof">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </button>
    <button class="add" onclick="openCam()">
        <svg viewBox="0 0 24 24" style="width:28px; height:28px; stroke:white; stroke-width:3; fill:none;"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button onclick="goTo(1)" class="nav-btn" id="btn-home">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </button>
</div>

<div id="cam-modal">
    <video id="video" autoplay playsinline muted></video>
    <div id="mic-wave"><div class="wave-anim"></div>🎤</div>
    <div style="position:absolute; bottom:60px; width:100%; display:flex; justify-content:space-around; align-items:center;">
        <button onclick="closeCam()" style="color:#fff; background:none; border:none; font-size:35px;">✕</button>
        <button onclick="capture()" id="snap-btn" style="width:80px; height:80px; border-radius:50%; border:6px solid #fff; background:none;"></button>
        <button id="rec-btn" onclick="toggleRec()" style="width:55px; height:55px; border-radius:50%; background:rgba(255,255,255,0.2); color:#fff; border:none; font-size:24px;">🎤</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const S_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
    const sb = supabase.createClient(S_URL, S_KEY);

    const idTag = new URLSearchParams(window.location.search).get('id');
    let profile = JSON.parse(localStorage.getItem('tracce_v4')) || { name: "Esploratore" };
    let mediaRecorder, chunks = [], audioBase64 = null;

    document.getElementById('u-name').innerText = "Ciao, " + profile.name;
    if(idTag) { loadFeed(); goTo(1); } else { document.getElementById('btn-prof').classList.add('active'); }

    async function loadFeed() {
        const { data } = await sb.from('spots').select('*').eq('id_tag', idTag).order('created_at', {ascending: false});
        const feed = document.getElementById('gallery-feed');
        if(data) {
            feed.innerHTML = data.map((t, i) => {
                const date = new Date(t.created_at).toLocaleString('it-IT', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
                return `
                <div class="spot-card">
                    <div class="spot-img-container">
                        <img src="${t.foto_url}" class="spot-img">
                        <div class="overlay"></div>
                        ${t.audio_url ? `
                            <div class="play-overlay" onclick="playAudio('${t.audio_url}', this, 'b-${i}', 'c-${i}')">
                                <div class="play-icon"></div>
                            </div>
                        ` : ''}
                    </div>
                    <div class="info">
                        <div class="date">${date}</div>
                        <h3 class="place-title">@${t.nome_posto}</h3>
                        <div class="p-cont" id="c-${i}" style="visibility:hidden"><div class="p-bar" id="b-${i}"></div></div>
                    </div>
                </div>
            `}).join('');
        }
    }

    function playAudio(url, playBtn, barId, contId) {
        if (!window.currentAudio) window.currentAudio = new Audio();
        const audio = window.currentAudio;
        audio.src = url;
        const bar = document.getElementById(barId);
        const cont = document.getElementById(contId);
        cont.style.visibility = 'visible';
        playBtn.style.opacity = "0.3";
        audio.ontimeupdate = () => { if (audio.duration) bar.style.width = (audio.currentTime / audio.duration * 100) + "%"; };
        audio.play().catch(() => { alert("Tocca di nuovo!"); });
        audio.onended = () => { cont.style.visibility = 'hidden'; bar.style.width = "0%"; playBtn.style.opacity = "1"; };
    }

    async function toggleRec() {
        const btn = document.getElementById('rec-btn');
        const wave = document.getElementById('mic-wave');
        if(!mediaRecorder || mediaRecorder.state === 'inactive') {
            const stream = await navigator.mediaDevices.getUserMedia({audio: true});
            const mime = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
            mediaRecorder = new MediaRecorder(stream, {mimeType: mime});
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, {type: mime});
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => { audioBase64 = reader.result; btn.style.background = "#4cd964"; btn.innerText = "✅"; };
                wave.style.display = 'none';
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start();
            btn.style.background = "red"; btn.innerText = "⏹"; wave.style.display = 'flex';
        } else { mediaRecorder.stop(); }
    }

    async function capture() {
        const v = document.getElementById('video');
        const c = document.getElementById('canvas');
        c.width = 640; c.height = 480;
        c.getContext('2d').drawImage(v, 0, 0, 640, 480);
        const foto = c.toDataURL('image/jpeg', 0.5);
        await sb.from('spots').insert([{ id_tag: idTag, nome_posto: profile.name, foto_url: foto, audio_url: audioBase64 }]);
        location.reload();
    }

    function openCam() { document.getElementById('cam-modal').style.display = 'block'; navigator.mediaDevices.getUserMedia({video: {facingMode:'environment'}}).then(s => document.getElementById('video').srcObject = s); }
    function closeCam() { const v = document.getElementById('video'); if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop()); document.getElementById('cam-modal').style.display = 'none'; }
    function goTo(p) { document.getElementById('slider').style.transform = `translateX(-${p * 100}vw)`; document.getElementById('btn-prof').classList.toggle('active', p===0); document.getElementById('btn-home').classList.toggle('active', p===1); }
    function editName() { const n = prompt("Tuo nome:"); if(n) { profile.name = n; localStorage.setItem('tracce_v4', JSON.stringify(profile)); location.reload(); }}
    function genQR() { 
        const n = document.getElementById('place-name').value; 
        if(!n) return alert("Scrivi un nome!");
        const url = window.location.origin + window.location.pathname + "?id=" + encodeURIComponent(n);
        const qr = document.getElementById('qrcode');
        qr.style.display = 'flex'; qr.innerHTML = "";
        new QRCode(qr, {text: url, width: 150, height: 150});
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #ff3b30; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; height: 100dvh; overflow: hidden; }
        
        #slider { display: flex; width: 200vw; height: 100dvh; transition: 0.5s cubic-bezier(0.2, 1, 0.2, 1); }
        .page { width: 100vw; height: 100dvh; position: relative; overflow-y: auto; padding-bottom: 110px; }

        .spot-card { height: 100dvh; scroll-snap-align: start; position: relative; background: #000; border-bottom: 1px solid #111; }
        .spot-img { width: 100%; height: 100%; object-fit: cover; }
        .info { position: absolute; bottom: 140px; left: 20px; right: 20px; z-index: 10; pointer-events: none; }
        .info * { pointer-events: auto; }
        
        .date { font-size: 12px; color: rgba(255,255,255,0.5); font-weight: 600; margin-bottom: 5px; }
        .btn-audio { background: #fff; color: #000; border: none; padding: 16px 30px; border-radius: 40px; font-weight: 900; letter-spacing: -0.5px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); }
        
        .p-cont { width: 100%; height: 5px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-top: 15px; display: none; overflow: hidden; }
        .p-bar { height: 100%; background: #fff; width: 0%; }

        .nav { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 35px; z-index: 1000; background: rgba(20,20,20,0.9); padding: 12px 35px; border-radius: 50px; backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
        .add { width: 65px; height: 65px; background: var(--accent); border-radius: 50%; border: none; font-size: 35px; color: #fff; box-shadow: 0 0 20px rgba(255,59,48,0.3); }

        #cam-modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; }
        video { width: 100%; height: 100%; object-fit: cover; }
        #rec-notif { position: absolute; top: 50px; left: 50%; transform: translateX(-50%); color: var(--accent); font-weight: 900; display: none; text-shadow: 0 0 10px #000; }
    </style>
</head>
<body>

<div id="slider">
    <div class="page" style="padding: 60px 25px;">
        <h1 id="u-name" onclick="editName()" style="font-size: 42px; font-weight: 900; margin:0;">Ciao!</h1>
        <div style="background: #111; padding: 25px; border-radius: 25px; margin-top: 35px; border: 1px solid #222;">
            <input type="text" id="place-name" placeholder="Nome di questo posto..." style="width:100%; padding:18px; border-radius:15px; border:none; background:#1c1c1e; color:#fff; font-size:16px; margin-bottom:12px;">
            <button onclick="genQR()" style="width:100%; padding:18px; border-radius:15px; background:#fff; font-weight:900; color:#000; border:none;">GENERA QR</button>
            <div id="qrcode" style="margin-top:20px; display:none; justify-content:center; background:#fff; padding:15px; border-radius:15px;"></div>
        </div>
    </div>
    <div class="page" id="gallery-feed" style="scroll-snap-type: y mandatory;"></div>
</div>

<div class="nav">
    <button onclick="goTo(0)" style="background:none; border:none; color:#fff; font-size:24px; opacity:0.6;">👤</button>
    <button class="add" onclick="openCam()">+</button>
    <button onclick="goTo(1)" style="background:none; border:none; color:#fff; font-size:24px; opacity:0.6;">🏠</button>
</div>

<div id="cam-modal">
    <div id="rec-notif">● REGISTRAZIONE</div>
    <video id="video" autoplay playsinline muted></video>
    <div style="position:absolute; bottom:60px; width:100%; display:flex; justify-content:space-around; align-items:center;">
        <button onclick="closeCam()" style="color:#fff; background:none; border:none; font-size:35px;">✕</button>
        <button onclick="capture()" id="snap-btn" style="width:80px; height:80px; border-radius:50%; border:6px solid #fff; background:none;"></button>
        <button id="rec-btn" onclick="toggleRec()" style="width:55px; height:55px; border-radius:50%; background:rgba(255,255,255,0.2); color:#fff; border:none; font-size:24px;">🎤</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const S_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
    const sb = supabase.createClient(S_URL, S_KEY);

    const idTag = new URLSearchParams(window.location.search).get('id');
    let profile = JSON.parse(localStorage.getItem('tracce_v4')) || { name: "Esploratore" };
    let mediaRecorder, chunks = [], audioBase64 = null;

    document.getElementById('u-name').innerText = "Ciao, " + profile.name;
    if(idTag) { loadFeed(); goTo(1); }

    async function loadFeed() {
        const { data } = await sb.from('spots').select('*').eq('id_tag', idTag).order('created_at', {ascending: false});
        const feed = document.getElementById('gallery-feed');
        if(data) {
            feed.innerHTML = data.map((t, i) => {
                const date = new Date(t.created_at).toLocaleString('it-IT', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
                return `
                <div class="spot-card">
                    <img src="${t.foto_url}" class="spot-img">
                    <div class="info">
                        <div class="date">${date}</div>
                        <h3 style="margin:0 0 10px 0; font-size:30px; font-weight:900;">@${t.nome_posto}</h3>
                        ${t.audio_url ? `
                            <button class="btn-audio" onclick="playAudio('${t.audio_url}', this, 'b-${i}', 'c-${i}')">ASCOLTA</button>
                            <div class="p-cont" id="c-${i}"><div class="p-bar" id="b-${i}"></div></div>
                        ` : ''}
                    </div>
                </div>
            `}).join('');
        }
    }

    // FUNZIONE AUDIO AGGIORNATA PER IPHONE
    function playAudio(url, btn, barId, contId) {
        // Creiamo l'elemento audio immediatamente al click
        if (!window.currentAudio) window.currentAudio = new Audio();
        
        const audio = window.currentAudio;
        audio.src = url;
        audio.preload = "auto";
        
        const bar = document.getElementById(barId);
        const cont = document.getElementById(contId);
        
        btn.innerText = "CARICAMENTO...";
        
        audio.onplay = () => {
            btn.innerText = "IN RIPRODUZIONE";
            cont.style.display = 'block';
        };

        audio.ontimeupdate = () => {
            if (audio.duration) {
                bar.style.width = (audio.currentTime / audio.duration * 100) + "%";
            }
        };

        // Il segreto: chiamare play() immediatamente dentro l'evento click
        const playPromise = audio.play();

        if (playPromise !== undefined) {
            playPromise.then(() => {
                // Audio partito!
            }).catch(error => {
                console.log("Blocco Safari: richiede secondo tocco");
                btn.innerText = "TOCCA DI NUOVO PER SBLOCCARE";
                cont.style.display = 'none';
            });
        }

        audio.onended = () => {
            btn.innerText = "ASCOLTA";
            cont.style.display = 'none';
            bar.style.width = "0%";
        };
    }

    async function toggleRec() {
        const btn = document.getElementById('rec-btn');
        const notif = document.getElementById('rec-notif');
        if(!mediaRecorder || mediaRecorder.state === 'inactive') {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({audio: true});
                const mime = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
                mediaRecorder = new MediaRecorder(stream, {mimeType: mime});
                chunks = [];
                mediaRecorder.ondataavailable = e => chunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const blob = new Blob(chunks, {type: mime});
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => { 
                        audioBase64 = reader.result; 
                        btn.style.background = "#4cd964"; 
                        btn.innerText = "✅";
                    };
                    notif.style.display = 'none';
                    stream.getTracks().forEach(t => t.stop());
                };
                mediaRecorder.start();
                btn.style.background = "red"; btn.innerText = "⏹"; notif.style.display = 'block';
            } catch(e) { alert("Attiva il microfono nelle impostazioni!"); }
        } else { mediaRecorder.stop(); }
    }

    async function capture() {
        const btn = document.getElementById('snap-btn');
        btn.style.borderColor = "#4cd964";
        const v = document.getElementById('video');
        const c = document.getElementById('canvas');
        c.width = 640; c.height = 480;
        c.getContext('2d').drawImage(v, 0, 0, 640, 480);
        const foto = c.toDataURL('image/jpeg', 0.5);
        
        // Messaggio di attesa
        btn.innerText = "INVIO...";
        
        await sb.from('spots').insert([{ id_tag: idTag, nome_posto: profile.name, foto_url: foto, audio_url: audioBase64 }]);
        location.reload();
    }

    function openCam() { 
        document.getElementById('cam-modal').style.display = 'block'; 
        navigator.mediaDevices.getUserMedia({video: {facingMode:'environment'}})
            .then(s => document.getElementById('video').srcObject = s)
            .catch(e => alert("Attiva la fotocamera!"));
    }
    function closeCam() { 
        const v = document.getElementById('video');
        if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
        document.getElementById('cam-modal').style.display = 'none'; 
    }
    function goTo(p) { document.getElementById('slider').style.transform = `translateX(-${p * 100}vw)`; }
    function editName() { const n = prompt("Tuo nome:"); if(n) { profile.name = n; localStorage.setItem('tracce_v4', JSON.stringify(profile)); location.reload(); }}
    function genQR() { 
        const n = document.getElementById('place-name').value; 
        if(!n) return alert("Scrivi un nome!");
        const qr = document.getElementById('qrcode');
        qr.style.display = 'flex'; qr.innerHTML = "";
        new QRCode(qr, {text: window.location.origin + window.location.pathname + "?id=" + encodeURIComponent(n), width: 150, height: 150});
    }
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TRACCE | BeReal Style</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        .bereal-border { border: 1.5px solid #222; }
        .btn-primary { background-color: #fff; color: #000; font-weight: 900; border-radius: 14px; transition: all 0.1s; }
        .btn-primary:active { transform: scale(0.96); opacity: 0.9; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .dot-red { background-color: #ff3b30; box-shadow: 0 0 10px #ff3b30; }
        .dot-green { background-color: #34c759; box-shadow: 0 0 10px #34c759; }
        #exist-img { object-fit: cover; filter: brightness(0.8); }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <header class="p-6 flex justify-between items-center">
        <h1 class="text-2xl font-black italic uppercase tracking-tighter">Tracce.</h1>
        <div id="status-bar" class="text-[10px] font-bold text-zinc-500 flex items-center">
            <span id="dot" class="status-dot dot-red"></span>
            <span id="status-text">OFFLINE</span>
        </div>
    </header>

    <main class="flex-grow px-4 flex flex-col items-center">
        <div id="main-card" class="w-full aspect-[3/4] bereal-border rounded-[2.5rem] relative overflow-hidden bg-zinc-900 flex flex-col items-center justify-center p-8 text-center shadow-2xl">
            
            <div id="loader" class="text-zinc-500 font-bold animate-pulse text-xs uppercase tracking-widest">Sincronizzazione...</div>

            <div id="new-ui" class="hidden space-y-4">
                <p class="text-2xl font-black uppercase italic">Varco Vergine</p>
                <p class="text-zinc-500 text-sm">Nessuna traccia qui.<br>Sblocca la posizione per lasciare il segno.</p>
            </div>

            <div id="exist-ui" class="hidden w-full h-full flex flex-col">
                <div class="absolute top-8 left-8 z-20 text-left">
                    <p id="exist-name" class="text-4xl font-black italic uppercase leading-none text-white drop-shadow-xl"></p>
                    <p id="exist-date" class="text-[11px] font-bold text-zinc-300 mt-2 uppercase tracking-[0.2em] opacity-80"></p>
                </div>
                <img id="exist-img" class="absolute inset-0 w-full h-full z-10">
            </div>

            <div id="input-area" class="hidden w-full mt-6 z-20 px-4">
                <input type="text" id="post-name" placeholder="Dai un nome a questo posto..." 
                       class="w-full bg-transparent border-b-2 border-white/30 py-4 text-xl font-bold outline-none focus:border-white transition-colors placeholder:text-zinc-700 text-center">
            </div>
        </div>
    </main>

    <footer class="p-8">
        <button id="main-btn" class="btn-primary w-full py-5 text-xs uppercase tracking-[0.2em] shadow-lg">
            Sblocca Posizione
        </button>
        <p class="text-[9px] text-zinc-700 text-center mt-6 font-bold uppercase tracking-[0.3em]">SOCIAL NETWORK REALE • 2026</p>
    </footer>

    <input type="file" id="camera" accept="image/*" capture="environment" class="hidden">

    <script>
        // CONFIGURAZIONE SUPABASE
        const SB_URL = "https://gdsrmowtzcahbtagxoft.supabase.co";
        const SB_KEY = "sb_publishable_aX0nphFahb6sPsBKYb4pRw_PMng7si5";
        const supabase = window.supabase.createClient(SB_URL, SB_KEY);

        const urlParams = new URLSearchParams(window.location.search);
        const tagID = urlParams.get('id') || 'home_default';
        let userPos = null;

        const mainBtn = document.getElementById('main-btn');

        // 1. CARICAMENTO DATI
        async function init() {
            const { data, error } = await supabase
                .from('spots')
                .select('*')
                .eq('id_tag', tagID)
                .single();

            document.getElementById('loader').classList.add('hidden');

            if (data) {
                document.getElementById('exist-ui').classList.remove('hidden');
                document.getElementById('exist-name').innerText = data.nome_posto;
                document.getElementById('exist-img').src = data.foto_url;
                document.getElementById('exist-date').innerText = new Date(data.creato_at).toLocaleString('it-IT', { day: '2-digit', month: 'short', hour: '2-digit', minute: '2-digit' });
                mainBtn.innerText = "SOVRASCRIVI TRACCIA";
            } else {
                document.getElementById('new-ui').classList.remove('hidden');
            }
        }

        // 2. GESTIONE GPS E FOTO
        mainBtn.onclick = () => {
            if (!userPos) {
                mainBtn.innerText = "LOCALIZZAZIONE...";
                navigator.geolocation.getCurrentPosition((pos) => {
                    userPos = pos.coords;
                    document.getElementById('dot').className = "status-dot dot-green";
                    document.getElementById('status-text').innerText = "ONLINE";
                    document.getElementById('status-text').classList.add('text-zinc-300');
                    
                    document.getElementById('new-ui').classList.add('hidden');
                    document.getElementById('exist-ui').classList.add('hidden');
                    document.getElementById('input-area').classList.remove('hidden');
                    
                    mainBtn.innerText = "SCATTA ORA";
                    mainBtn.onclick = () => document.getElementById('camera').click();
                }, (err) => {
                    alert("Attiva il GPS per usare Tracce.");
                    mainBtn.innerText = "SBLOCCA POSIZIONE";
                });
            }
        };

        // 3. SALVATAGGIO SU SUPABASE
        document.getElementById('camera').onchange = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            mainBtn.innerText = "PUBBLICAZIONE...";
            mainBtn.disabled = true;

            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = async () => {
                const { error } = await supabase.from('spots').upsert({
                    id_tag: tagID,
                    nome_posto: document.getElementById('post-name').value || "Posto Ignoto",
                    foto_url: reader.result,
                    latitudine: userPos.latitude,
                    longitudine: userPos.longitude
                });

                if (error) {
                    alert("Errore salvataggio: " + error.message);
                    mainBtn.disabled = false;
                    mainBtn.innerText = "RIPROVA";
                } else {
                    location.reload();
                }
            };
        };

        init();
    </script>
</body>
</html>

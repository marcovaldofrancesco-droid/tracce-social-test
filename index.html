<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE PRO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #ff3b30; }
        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background: #000; color: #fff; height: 100dvh; overflow: hidden; }
        
        #slider { display: flex; width: 200vw; height: 100dvh; transition: 0.5s cubic-bezier(0.2, 1, 0.2, 1); }
        .page { width: 100vw; height: 100dvh; position: relative; overflow-y: auto; padding-bottom: 100px; }

        /* HEADER */
        .location-header {
            position: absolute; top: 45px; left: 0; width: 100%; text-align: center; z-index: 20;
            font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 3px; color: rgba(255,255,255,0.5);
        }

        #profile-page { padding: 100px 25px 40px 25px; }

        .spot-card { 
            height: 100dvh; scroll-snap-align: start; position: relative; background: #000; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding-bottom: 80px; /* Spazio per la barra schiacciata */
        }
        
        /* FORMATO 9:16 - ANCORA PIÙ RETTAGOLARE */
        .spot-img-container {
            width: 82%; 
            aspect-ratio: 9 / 16; 
            position: relative; 
            overflow: hidden; 
            border-radius: 25px; 
            background: #111; 
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            border: 1px solid rgba(255,255,255,0.08);
        }
        
        .spot-img { width: 100%; height: 100%; object-fit: cover; display: block; }
        
        .overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 70%, rgba(0,0,0,0.5)); pointer-events: none; }
        
        .play-overlay { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80px; height: 80px; background: rgba(255,255,255,0.1); 
            backdrop-filter: blur(15px); border-radius: 50%; 
            display: flex; align-items: center; justify-content: center;
            border: 1px solid rgba(255,255,255,0.1); z-index: 5;
        }
        .play-icon { width: 0; height: 0; border-top: 12px solid transparent; border-bottom: 12px solid transparent; border-left: 20px solid white; margin-left: 5px; }

        /* INFO POSIZIONATE PER NON COPRIRE IL NOME */
        .info { width: 82%; margin-top: 15px; }
        .date { font-size: 9px; color: rgba(255,255,255,0.3); font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .place-title { margin: 2px 0; font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        
        .p-cont { width: 100%; height: 2px; background: rgba(255,255,255,0.1); border-radius: 1px; margin-top: 10px; overflow: hidden; }
        .p-bar { height: 100%; background: #fff; width: 0%; }

        /* NAVIGAZIONE SCHIACCIATA */
        .nav { 
            position: fixed; bottom: 25px; left: 50%; transform: translateX(-50%); 
            display: flex; gap: 35px; z-index: 1000; 
            background: rgba(15,15,15,0.95); 
            padding: 8px 30px; /* Ridotto padding verticale */
            border-radius: 40px; 
            backdrop-filter: blur(20px); 
            border: 1px solid rgba(255,255,255,0.1); 
            align-items: center;
        }
        .nav-btn { background: none; border: none; color: #fff; opacity: 0.3; display: flex; align-items: center; justify-content: center; width: 28px; height: 28px; }
        .nav-btn.active { opacity: 1; }
        
        /* PULSANTE + PIÙ PICCOLO */
        .add { width: 52px; height: 52px; background: var(--accent); border-radius: 50%; border: none; display: flex; align-items: center; justify-content: center; box-shadow: 0 8px 20px rgba(255,59,48,0.3); }
        .svg-icon { width: 20px; height: 20px; fill: currentColor; }
    </style>
</head>
<body>

<div id="slider">
    <div class="page" id="profile-page">
        <h1 id="u-name" onclick="editName()" style="font-size: 42px; font-weight: 900; margin:0; letter-spacing: -2px;">Ciao!</h1>
        <div style="background: #111; padding: 25px; border-radius: 30px; margin-top: 40px; border: 1px solid #222;">
            <input type="text" id="place-name" placeholder="Nome di questo posto..." style="width:100%; padding:18px; border-radius:15px; border:none; background:#1c1c1e; color:#fff; font-size:16px; margin-bottom:12px;">
            <button onclick="genQR()" style="width:100%; padding:18px; border-radius:15px; background:#fff; font-weight:900; color:#000; border:none;">GENERA QR</button>
            <div id="qrcode" style="margin-top:20px; display:none; justify-content:center; background:#fff; padding:15px; border-radius:15px;"></div>
        </div>
    </div>
    <div class="page" id="gallery-feed" style="scroll-snap-type: y mandatory;">
        <div class="location-header" id="current-loc"></div>
    </div>
</div>

<div class="nav">
    <button onclick="goTo(0)" class="nav-btn" id="btn-prof">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
    </button>
    <button class="add" onclick="openCam()">
        <svg viewBox="0 0 24 24" style="width:24px; height:24px; stroke:white; stroke-width:3; fill:none;"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button onclick="goTo(1)" class="nav-btn" id="btn-home">
        <svg class="svg-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    </button>
</div>

<div id="cam-modal" style="position:fixed; inset:0; background:#000; z-index:2000; display:none;">
    <video id="video" autoplay playsinline muted style="width:100%; height:100%; object-fit:cover;"></video>
    <div style="position:absolute; bottom:60px; width:100%; display:flex; justify-content:space-around; align-items:center;">
        <button onclick="closeCam()" style="color:#fff; background:none; border:none; font-size:35px;">✕</button>
        <button onclick="capture()" id="snap-btn" style="width:75px; height:75px; border-radius:50%; border:5px solid #fff; background:none;"></button>
        <button id="rec-btn" onclick="toggleRec()" style="width:50px; height:50px; border-radius:50%; background:rgba(255,255,255,0.2); color:#fff; border:none; font-size:20px;">🎤</button>
    </div>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const S_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
    const sb = supabase.createClient(S_URL, S_KEY);
    const idTag = new URLSearchParams(window.location.search).get('id');
    let profile = JSON.parse(localStorage.getItem('tracce_v4')) || { name: "Esploratore" };
    let mediaRecorder, chunks = [], audioBase64 = null;

    document.getElementById('u-name').innerText = "Ciao, " + profile.name;

    if(idTag) { 
        document.getElementById('current-loc').innerText = "📍 " + decodeURIComponent(idTag);
        loadFeed(); goTo(1); 
    } else { 
        document.getElementById('btn-prof').classList.add('active'); 
    }

    async function loadFeed() {
        const { data } = await sb.from('spots').select('*').eq('id_tag', idTag).order('created_at', {ascending: false});
        const feed = document.getElementById('gallery-feed');
        if(data) {
            const items = data.map((t, i) => {
                const date = new Date(t.created_at).toLocaleString('it-IT', {day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'});
                return `
                <div class="spot-card">
                    <div class="spot-img-container">
                        <img src="${t.foto_url}" class="spot-img">
                        <div class="overlay"></div>
                        ${t.audio_url ? `<div class="play-overlay" onclick="playAudio('${t.audio_url}', this, 'b-${i}', 'c-${i}')"><div class="play-icon"></div></div>` : ''}
                    </div>
                    <div class="info">
                        <div class="date">${date}</div>
                        <h3 class="place-title">@${t.nome_posto}</h3>
                        <div class="p-cont" id="c-${i}" style="visibility:hidden"><div class="p-bar" id="b-${i}"></div></div>
                    </div>
                </div>`
            }).join('');
            feed.innerHTML = `<div class="location-header">📍 ${decodeURIComponent(idTag)}</div>` + items;
        }
    }

    function playAudio(url, playBtn, barId, contId) {
        if (!window.currentAudio) window.currentAudio = new Audio();
        const audio = window.currentAudio;
        audio.src = url;
        const bar = document.getElementById(barId);
        const cont = document.getElementById(contId);
        cont.style.visibility = 'visible';
        playBtn.style.opacity = "0.3";
        audio.ontimeupdate = () => { if (audio.duration) bar.style.width = (audio.currentTime / audio.duration * 100) + "%"; };
        audio.play().catch(() => alert("Tocca di nuovo!"));
        audio.onended = () => { cont.style.visibility = 'hidden'; bar.style.width = "0%"; playBtn.style.opacity = "1"; };
    }

    async function toggleRec() {
        const btn = document.getElementById('rec-btn');
        if(!mediaRecorder || mediaRecorder.state === 'inactive') {
            const stream = await navigator.mediaDevices.getUserMedia({audio: true});
            const mime = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
            mediaRecorder = new MediaRecorder(stream, {mimeType: mime});
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, {type: mime});
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => { audioBase64 = reader.result; btn.style.background = "#4cd964"; btn.innerText = "✅"; };
                stream.getTracks().forEach(t => t.stop());
            };
            mediaRecorder.start();
            btn.style.background = "red"; btn.innerText = "⏹";
        } else { mediaRecorder.stop(); }
    }

    async function capture() {
        const v = document.getElementById('video');
        const c = document.getElementById('canvas');
        c.width = 1080; c.height = 1920;
        c.getContext('2d').drawImage(v, 0, 0, 1080, 1920);
        const foto = c.toDataURL('image/jpeg', 0.7);
        await sb.from('spots').insert([{ id_tag: idTag, nome_posto: profile.name, foto_url: foto, audio_url: audioBase64 }]);
        location.reload();
    }

    function openCam() { document.getElementById('cam-modal').style.display = 'block'; navigator.mediaDevices.getUserMedia({video: {facingMode:'environment'}}).then(s => document.getElementById('video').srcObject = s); }
    function closeCam() { const v = document.getElementById('video'); if(v.srcObject) v.srcObject.getTracks().forEach(t => t.stop()); document.getElementById('cam-modal').style.display = 'none'; }
    function goTo(p) { document.getElementById('slider').style.transform = `translateX(-${p * 100}vw)`; document.getElementById('btn-prof').classList.toggle('active', p===0); document.getElementById('btn-home').classList.toggle('active', p===1); }
    function editName() { const n = prompt("Tuo nome:"); if(n) { profile.name = n; localStorage.setItem('tracce_v4', JSON.stringify(profile)); location.reload(); }}
    function genQR() { 
        const n = document.getElementById('place-name').value; if(!n) return alert("Scrivi un nome!");
        const qr = document.getElementById('qrcode'); qr.style.display = 'flex'; qr.innerHTML = "";
        new QRCode(qr, {text: window.location.origin + window.location.pathname + "?id=" + encodeURIComponent(n), width: 150, height: 150});
    }
</script>
</body>
</html>

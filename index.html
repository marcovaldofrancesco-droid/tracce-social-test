<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE PREMIUM</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { 
            --accent: #ff3b30; 
            --bg: #000;
            --card-bg: #1c1c1e;
            --glass: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; }
        
        body { margin: 0; background: var(--bg); color: #fff; height: 100dvh; overflow: hidden; -webkit-font-smoothing: antialiased; }

        /* Slider Pagine */
        #main-slider { display: flex; width: 200vw; height: 100dvh; transition: 0.6s cubic-bezier(0.23, 1, 0.32, 1); }
        .page { width: 100vw; height: 100dvh; position: relative; overflow-y: auto; padding-bottom: 140px; }

        /* Feed Style */
        #gallery-feed { height: 100%; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; scrollbar-width: none; }
        #gallery-feed::-webkit-scrollbar { display: none; }

        .spot-card { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; overflow: hidden; }
        .spot-img { width: 100%; height: 100%; object-fit: cover; }
        
        /* Overlay Gradiente per leggibilità */
        .spot-card::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, rgba(0,0,0,0.3) 0%, transparent 40%, rgba(0,0,0,0.9) 100%);
            pointer-events: none;
        }

        .info { position: absolute; bottom: 140px; left: 25px; right: 25px; z-index: 10; }
        .info h3 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.5px; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }

        /* Buttons & Bars */
        .btn-audio { 
            background: #fff; color: #000; border: none; padding: 14px 24px; border-radius: 40px; 
            font-weight: 700; font-size: 14px; margin-top: 15px; cursor: pointer;
            display: flex; align-items: center; gap: 10px; transition: 0.2s;
        }
        .btn-audio:active { transform: scale(0.96); }

        .play-bar-bg { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 10px; margin-top: 12px; display: none; }
        .play-bar-fill { height: 100%; background: #fff; width: 0%; border-radius: 10px; }

        /* Navigation Glass */
        .nav { 
            position: fixed; bottom: 35px; left: 50%; transform: translateX(-50%); 
            display: flex; align-items: center; gap: 35px; z-index: 1000; 
            background: rgba(30, 30, 30, 0.7); padding: 10px 40px; border-radius: 50px; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .nav-btn { background: none; border: none; color: #fff; font-size: 24px; opacity: 0.5; transition: 0.3s; padding: 10px; }
        .nav-btn.active { opacity: 1; }
        .add { width: 64px; height: 64px; background: #fff; border-radius: 50%; border: none; color: #000; font-size: 30px; font-weight: bold; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        /* Camera & Recording Pulse */
        #cam-modal { position: fixed; inset: 0; background: #000; z-index: 2000; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .cam-controls { position: absolute; bottom: 50px; width: 100%; display: flex; justify-content: space-around; align-items: center; }
        
        #rec-btn.recording { animation: pulse 1.5s infinite; background: var(--accent) !important; color: #fff; }
        @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0.7); } 70% { box-shadow: 0 0 0 15px rgba(255, 59, 48, 0); } 100% { box-shadow: 0 0 0 0 rgba(255, 59, 48, 0); } }

        /* Profile & QR Styles */
        .card { background: var(--card-bg); border-radius: 24px; padding: 25px; margin-top: 20px; border: 1px solid rgba(255,255,255,0.05); }
        input[type="text"] { width: 100%; background: #2c2c2e; border: none; padding: 16px; border-radius: 14px; color: #fff; font-size: 16px; margin-bottom: 12px; }
        .btn-main { width: 100%; padding: 16px; background: #fff; color: #000; border: none; border-radius: 14px; font-weight: 700; font-size: 16px; }

        #loader { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; font-weight: 700; }
    </style>
</head>
<body>

<div id="loader">CARICAMENTO...</div>

<div id="main-slider">
    <div class="page" style="padding: 60px 25px;">
        <h1 id="u-name" onclick="editName()" style="font-size: 40px; font-weight: 900; margin: 0;">Ciao!</h1>
        <p style="opacity: 0.5; margin-top: 5px;">Tocca il nome per cambiarlo</p>
        
        <div class="card">
            <h4 style="margin: 0 0 15px 0; opacity: 0.7; font-size: 14px; text-transform: uppercase;">Nuovo Tag Posto</h4>
            <input type="text" id="place-name" placeholder="Es: Navigli, Milano...">
            <button class="btn-main" onclick="genQR()">Genera QR Code</button>
            <div id="qrcode" style="margin-top:20px; background:#fff; padding:20px; display:none; justify-content:center; border-radius:15px;"></div>
        </div>
    </div>

    <div class="page" style="padding:0;"><div id="gallery-feed"></div></div>
</div>

<div id="cam-modal">
    <video id="video" autoplay playsinline muted></video>
    <div class="cam-controls">
        <button onclick="closeCam()" style="color:#fff; background:none; border:none; font-size:30px;">✕</button>
        <button onclick="capture()" style="width:80px; height:80px; border-radius:50%; border:5px solid #fff; background:none;"></button>
        <button id="rec-btn" onclick="toggleRec()" style="color:#fff; background:rgba(255,255,255,0.2); border:none; width:55px; height:55px; border-radius:50%; font-size:22px;">🎤</button>
    </div>
</div>

<div class="nav">
    <button class="nav-btn active" id="btn-p" onclick="goTo(0)">👤</button>
    <button class="add" onclick="openCam()">+</button>
    <button class="nav-btn" id="btn-f" onclick="goTo(1)">🏠</button>
</div>

<canvas id="canvas" style="display:none;"></canvas>

<script>
    const S_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
    const sb = supabase.createClient(S_URL, S_KEY);

    const idTag = new URLSearchParams(window.location.search).get('id');
    let profile = JSON.parse(localStorage.getItem('tracce_v4')) || { name: "Esploratore" };
    let mediaRecorder, chunks = [], audioBase64 = null;

    document.getElementById('u-name').innerText = "Ciao, " + profile.name;

    if(idTag) { loadFeed(); goTo(1); }

    async function loadFeed() {
        const { data } = await sb.from('spots').select('*').eq('id_tag', idTag).order('created_at', {ascending: false});
        const feed = document.getElementById('gallery-feed');
        if(data && data.length > 0) {
            feed.innerHTML = data.map((t, i) => `
                <div class="spot-card">
                    <img src="${t.foto_url}" class="spot-img">
                    <div class="info">
                        <h3>@${t.nome_posto}</h3>
                        ${t.audio_url ? `
                            <button class="btn-audio" onclick="playAudio('${t.audio_url}', this, 'pbar-${i}')">
                                <span>▶</span> ASCOLTA TRACCIA
                            </button>
                            <div class="play-bar-bg" id="pwrap-${i}"><div class="play-bar-fill" id="pbar-${i}"></div></div>
                        ` : ''}
                    </div>
                </div>
            `).join('');
        } else {
            feed.innerHTML = "<div style='padding:150px 40px; text-align:center; opacity:0.4;'>Ancora nessuna traccia qui.<br>Sii il primo!</div>";
        }
    }

    function playAudio(base64, btn, barId) {
        const audio = new Audio(base64);
        const bar = document.getElementById(barId);
        const wrap = document.getElementById('pwrap-' + barId.split('-')[1]);
        wrap.style.display = 'block';
        btn.querySelector('span').innerText = "⌛";

        audio.ontimeupdate = () => bar.style.width = (audio.currentTime / audio.duration * 100) + "%";
        audio.play().then(() => btn.querySelector('span').innerText = "🎵");
        audio.onended = () => { btn.querySelector('span').innerText = "▶"; wrap.style.display = 'none'; };
    }

    async function toggleRec() {
        const btn = document.getElementById('rec-btn');
        if(!mediaRecorder || mediaRecorder.state === 'inactive') {
            const s = await navigator.mediaDevices.getUserMedia({audio: true});
            const mime = MediaRecorder.isTypeSupported('audio/mp4') ? 'audio/mp4' : 'audio/webm';
            mediaRecorder = new MediaRecorder(s, { mimeType: mime });
            chunks = [];
            mediaRecorder.ondataavailable = e => chunks.push(e.data);
            mediaRecorder.onstop = () => {
                const blob = new Blob(chunks, { type: mime });
                const reader = new FileReader();
                reader.readAsDataURL(blob);
                reader.onloadend = () => { audioBase64 = reader.result; btn.innerText = "✅"; btn.classList.remove('recording'); };
            };
            mediaRecorder.start();
            btn.innerText = "●"; btn.classList.add('recording');
        } else { mediaRecorder.stop(); }
    }

    async function capture() {
        document.getElementById('loader').style.display = 'flex';
        const v = document.getElementById('video');
        const c = document.getElementById('canvas');
        c.width = 720; c.height = (v.videoHeight / v.videoWidth) * 720;
        c.getContext('2d').drawImage(v, 0, 0, c.width, c.height);
        const foto = c.toDataURL('image/jpeg', 0.7);

        await sb.from('spots').insert([{ id_tag: idTag, nome_posto: profile.name, foto_url: foto, audio_url: audioBase64 }]);
        location.reload();
    }

    function openCam() { 
        document.getElementById('cam-modal').style.display = 'block'; 
        navigator.mediaDevices.getUserMedia({video: {facingMode:'environment'}}).then(s => document.getElementById('video').srcObject = s);
    }
    function closeCam() { document.getElementById('cam-modal').style.display = 'none'; const s = document.getElementById('video').srcObject; if(s) s.getTracks().forEach(t => t.stop()); }
    
    function goTo(p) { 
        document.getElementById('main-slider').style.transform = `translateX(-${p * 100}vw)`;
        document.getElementById('btn-p').classList.toggle('active', p===0);
        document.getElementById('btn-f').classList.toggle('active', p===1);
    }

    function editName() { const n = prompt("Il tuo nome:"); if(n) { profile.name = n; localStorage.setItem('tracce_v4', JSON.stringify(profile)); location.reload(); }}
    function genQR() { 
        const n = document.getElementById('place-name').value; 
        if(!n) return alert("Inserisci un nome!");
        const url = window.location.origin + window.location.pathname + "?id=" + encodeURIComponent(n);
        const qr = document.getElementById('qrcode');
        qr.style.display = 'flex'; qr.innerHTML = "";
        new QRCode(qr, {text: url, width: 180, height: 180, colorDark: "#000000"});
    }
</script>
</body>
</html>

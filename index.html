<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TRACCE CHRONO</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --accent: #ff3b30; --bg: #000; --glass: rgba(255, 255, 255, 0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: -apple-system, sans-serif; }
        body { margin: 0; background: var(--bg); color: #fff; height: 100dvh; overflow: hidden; }

        /* --- UI ELEMENTS --- */
        #main-slider { display: flex; width: 200vw; height: 100dvh; transition: transform 0.6s cubic-bezier(0.2, 1, 0.2, 1); }
        .page { width: 100vw; height: 100dvh; position: relative; overflow-y: auto; padding: 40px 25px 120px; }
        #gallery-feed { height: 100%; width: 100%; overflow-y: scroll; scroll-snap-type: y mandatory; position: absolute; top:0; left:0; }
        #gallery-feed::-webkit-scrollbar { display: none; }
        
        .spot-card { height: 100dvh; width: 100vw; scroll-snap-align: start; position: relative; background: #000; }
        .spot-img { width: 100%; height: 100%; object-fit: cover; }
        .vignette { position: absolute; bottom: 0; width: 100%; height: 65%; background: linear-gradient(to top, #000 20%, transparent); pointer-events: none; }
        
        /* AUDIO BARS */
        .audio-container { margin-top: 15px; width: 100%; }
        .audio-badge { 
            background: var(--accent); color: #fff; padding: 15px 25px; border-radius: 30px; 
            font-size: 14px; font-weight: 900; display: flex; align-items: center; gap: 10px; 
            cursor: pointer; border: none; width: fit-content;
        }
        .progress-wrapper { width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; margin-top: 8px; overflow: hidden; display: none; }
        .progress-fill { width: 0%; height: 100%; background: #fff; transition: width 0.1s linear; }

        /* CAMERA & REC */
        #camera-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 5000; display: none; }
        #video { width: 100%; height: 100%; object-fit: cover; }
        .cam-ui { position: absolute; bottom: 40px; width: 100%; padding: 0 25px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
        
        .rec-interface { display: flex; flex-direction: column; align-items: center; width: 100%; gap: 10px; }
        .rec-bar-bg { width: 100%; height: 6px; background: rgba(255,255,255,0.2); border-radius: 3px; overflow: hidden; visibility: hidden; }
        .rec-bar-fill { width: 0%; height: 100%; background: var(--accent); }

        #rec-btn { background: rgba(255,255,255,0.2); border: 2px solid #fff; width: 70px; height: 70px; border-radius: 50%; font-size: 28px; color: #fff; display: flex; align-items: center; justify-content: center; }
        #rec-btn.recording { background: var(--accent); border-color: var(--accent); }
        #rec-btn.ready { border-color: #4cd964; color: #4cd964; box-shadow: 0 0 20px #4cd964; }

        /* LOADING & NAV */
        #loading-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:9999; display:none; align-items:center; justify-content:center; flex-direction:column; }
        .nav-dock { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 280px; height: 75px; background: rgba(0,0,0,0.8); backdrop-filter: blur(20px); border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); display: flex; justify-content: space-around; align-items: center; z-index: 4000; }
        .add-btn { width: 60px; height: 60px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 38px; color: #fff; border: none; }
        
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="loading-overlay">
        <div style="width: 40px; height: 40px; border: 4px solid #333; border-top-color: var(--accent); border-radius: 50%; animation: spin 1s linear infinite;"></div>
        <p id="load-text" style="margin-top: 20px; font-weight: 800; font-size: 12px;">CARICAMENTO...</p>
    </div>

    <div id="main-slider">
        <div class="page" id="profile-page">
            <h1 id="u-name" onclick="editName()">Esploratore</h1>
            <div style="margin-top:40px; background: var(--glass); padding: 20px; border-radius: 20px;">
                <input type="text" id="new-place-name" style="width:100%; background:#111; border:none; padding:15px; border-radius:15px; color:#fff;" placeholder="Nome luogo...">
                <button onclick="generateNewPlace()" style="width:100%; background:#fff; padding:15px; border-radius:15px; font-weight:bold; margin-top:10px; border:none;">GENERA QR</button>
                <div id="qrcode" style="margin-top:20px; display:none; justify-content:center; background:#fff; padding:15px; border-radius:15px;"></div>
            </div>
        </div>
        <div class="page" style="padding:0;"><div id="gallery-feed"></div></div>
    </div>

    <div id="camera-modal">
        <video id="video" autoplay playsinline muted></video>
        <div class="cam-ui">
            <div class="rec-interface">
                <div id="rec-status" style="font-size: 12px; font-weight: 800; color: var(--accent); visibility: hidden;">REGISTRAZIONE: <span id="timer-count">20</span>s</div>
                <div class="rec-bar-bg" id="rec-bar-container"><div class="rec-bar-fill" id="rec-bar-fill"></div></div>
                <input type="text" id="desc-input" placeholder="Descrivi questo momento..." style="width:100%; background:rgba(0,0,0,0.8); border:none; padding:18px; border-radius:20px; color:#fff;">
            </div>
            <div style="display:flex; align-items:center; gap:35px;">
                <button onclick="switchCamera()" style="background:none; border:none; font-size:30px;">🔄</button>
                <button onclick="capture()" style="width:80px; height:80px; border-radius:50%; border:5px solid #fff; background:none;"></button>
                <button id="rec-btn" onclick="toggleRecording()">🎤</button>
                <button onclick="closeCam()" style="background:none; border:none; font-size:30px; color:#fff;">✕</button>
            </div>
        </div>
    </div>

    <div class="nav-dock">
        <button onclick="goTo(0)" style="background:none; border:none; font-size:28px; opacity:0.5;">👤</button>
        <button class="add-btn" onclick="openCamWithUnlock()">+</button>
        <button onclick="goTo(1)" style="background:none; border:none; font-size:28px;">🏠</button>
    </div>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        const SUPABASE_URL = 'https://gdsrmowtzcahbtagxoft.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdkc3Jtb3d0emNhaGJ0YWd4b2Z0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5MTgzNDEsImV4cCI6MjA4OTQ5NDM0MX0.Ep-DcUjW1FnZduH-QIWUxyI0juRSLJS_K2TDM56DkCk';
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const idTag = new URLSearchParams(window.location.search).get('id');
        let profile = JSON.parse(localStorage.getItem('tracce_v4')) || { name: "Esploratore" };
        let mediaRecorder, audioChunks = [], currentFacing = 'environment', capturedAudioBlob = null;
        let recInterval, audioUnlocked = false;
        const MAX_REC_TIME = 20;

        if (idTag) { document.getElementById('u-name').innerText = profile.name; loadFeed(); goTo(1); }

        function unlockAudioContext() {
            if (audioUnlocked) return;
            new Audio("data:audio/wav;base64,UklGRigAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YQAAAAA=").play();
            audioUnlocked = true;
        }

        async function loadFeed() {
            const { data } = await supabaseClient.from('spots').select('*').eq('id_tag', idTag).order('created_at', { ascending: false });
            const feed = document.getElementById('gallery-feed');
            if (data) {
                feed.innerHTML = data.map((t, index) => `
                    <div class="spot-card">
                        <img src="${t.foto_url}" class="spot-img">
                        <div class="vignette"></div>
                        <div style="position:absolute; bottom:130px; left:25px; right:25px;">
                            <h2 style="margin:0; font-size:28px;">@${t.nome_posto}</h2>
                            <p style="margin:8px 0 20px; opacity:0.7;">${t.descrizione || ''}</p>
                            ${t.audio_url ? `
                                <div class="audio-container">
                                    <button class="audio-badge" onclick="playAudio('${t.audio_url}', this, 'p-bar-${index}')">🔊 ASCOLTA</button>
                                    <div class="progress-wrapper" id="p-bar-wrapper-${index}"><div class="progress-fill" id="p-bar-${index}"></div></div>
                                </div>
                            ` : ''}
                        </div>
                    </div>
                `).join('');
            }
        }

        async function toggleRecording() {
            const btn = document.getElementById('rec-btn');
            const barCont = document.getElementById('rec-bar-container');
            const barFill = document.getElementById('rec-bar-fill');
            const status = document.getElementById('rec-status');
            const timerText = document.getElementById('timer-count');

            if (!mediaRecorder || mediaRecorder.state === "inactive") {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                audioChunks = [];
                
                let timeLeft = MAX_REC_TIME;
                status.style.visibility = 'visible';
                barCont.style.visibility = 'visible';
                
                recInterval = setInterval(() => {
                    timeLeft -= 0.1;
                    const percent = ((MAX_REC_TIME - timeLeft) / MAX_REC_TIME) * 100;
                    barFill.style.width = percent + "%";
                    timerText.innerText = Math.ceil(timeLeft);
                    if (timeLeft <= 0) toggleRecording();
                }, 100);

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    clearInterval(recInterval);
                    capturedAudioBlob = new Blob(audioChunks, { type: 'audio/mp4' });
                    btn.classList.add('ready'); btn.innerText = "✅";
                    status.style.visibility = 'hidden';
                    barCont.style.visibility = 'hidden';
                };
                mediaRecorder.start();
                btn.classList.add('recording');
            } else {
                mediaRecorder.stop();
                btn.classList.remove('recording');
            }
        }

        function playAudio(url, btn, barId) {
            unlockAudioContext();
            const audio = new Audio(url);
            const bar = document.getElementById(barId);
            const wrapper = document.getElementById('p-bar-wrapper-' + barId.split('-')[2]);
            
            btn.innerText = "⏳ CARICAMENTO...";
            wrapper.style.display = 'block';

            audio.ontimeupdate = () => {
                const percent = (audio.currentTime / audio.duration) * 100;
                bar.style.width = percent + "%";
            };

            audio.play().then(() => {
                btn.innerText = "🎵 IN ASCOLTO";
                audio.onended = () => {
                    btn.innerText = "🔊 ASCOLTA";
                    wrapper.style.display = 'none';
                    bar.style.width = "0%";
                };
            });
        }

        async function capture() {
            document.getElementById('loading-overlay').style.display = 'flex';
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            c.width = v.videoWidth; c.height = v.videoHeight;
            const ctx = c.getContext('2d');
            if(currentFacing === 'user') { ctx.translate(c.width, 0); ctx.scale(-1, 1); }
            ctx.drawImage(v, 0, 0);
            
            const fotoBlob = await new Promise(r => c.toBlob(r, 'image/jpeg', 0.8));
            const name = profile.name.replace(/\s+/g, '_') + "_" + Date.now();

            try {
                // Upload Foto
                await supabaseClient.storage.from('spots').upload('foto/'+name+'.jpg', fotoBlob);
                const { data: fUrl } = supabaseClient.storage.from('spots').getPublicUrl('foto/'+name+'.jpg');

                // Upload Audio
                let aUrl = null;
                if(capturedAudioBlob) {
                    await supabaseClient.storage.from('spots').upload('audio/'+name+'.mp4', capturedAudioBlob);
                    const { data: res } = supabaseClient.storage.from('spots').getPublicUrl('audio/'+name+'.mp4');
                    aUrl = res.publicUrl;
                }

                await supabaseClient.from('spots').insert([{ 
                    id_tag: idTag, nome_posto: profile.name, 
                    descrizione: document.getElementById('desc-input').value, 
                    foto_url: fUrl.publicUrl, audio_url: aUrl 
                }]);

                location.reload();
            } catch (e) { alert("Errore upload!"); }
        }

        function openCamWithUnlock() { unlockAudioContext(); document.getElementById('camera-modal').style.display = 'block'; navigator.mediaDevices.getUserMedia({video:{facingMode:currentFacing, width:1280}}).then(s => document.getElementById('video').srcObject = s); }
        function closeCam() { document.getElementById('camera-modal').style.display = 'none'; if(document.getElementById('video').srcObject) document.getElementById('video').srcObject.getTracks().forEach(t => t.stop()); }
        function goTo(p) { document.getElementById('main-slider').style.transform = `translateX(-${p * 100}vw)`; }
        function editName() { const n = prompt("Nome:"); if(n) { profile.name = n; localStorage.setItem('tracce_v4', JSON.stringify(profile)); location.reload(); }}
        function switchCamera() { currentFacing = currentFacing==='environment'?'user':'environment'; openCamWithUnlock(); }
        function generateNewPlace() { const name = document.getElementById('new-place-name').value.trim().replace(/\s+/g, '-'); if(!name) return; const url = window.location.origin + window.location.pathname + "?id=" + name; const qrDiv = document.getElementById('qrcode'); qrDiv.style.display = 'flex'; qrDiv.innerHTML = ""; new QRCode(qrDiv, { text: url, width: 150, height: 150 }); }
    </script>
</body>
</html>
